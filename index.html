<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MONOANIME | чорно-білий перегляд аніме</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* ===== МОНОХРОМНІ ЗМІННІ ===== */
        :root {
            --bg: #fafafa; --surface: #ffffff; --text: #111111; --text-secondary: #4a4a4a; --text-muted: #6f6f6f;
            --border: #e0e0e0; --border-light: #ececec; --hover: #f5f5f5; --active: #111111; --active-text: #ffffff;
            --tag-bg: #f0f0f0; --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 18px 30px -12px rgba(0, 0, 0, 0.12); --shadow-lg: 0 30px 50px rgba(0, 0, 0, 0.2);
            --radius-sm: 20px; --radius: 24px; --radius-lg: 36px; --radius-xl: 48px; --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .dark-mode {
            --bg: #0d0d0d; --surface: #1a1a1a; --text: #f0f0f0; --text-secondary: #bbbbbb; --text-muted: #888888;
            --border: #333333; --border-light: #2a2a2a; --hover: #222222; --active: #f0f0f0; --active-text: #0d0d0d;
            --tag-bg: #252525; --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.3), 0 2px 4px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 18px 30px -12px rgba(0, 0, 0, 0.5); --shadow-lg: 0 30px 50px rgba(0, 0, 0, 0.6);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; transition: background var(--transition), color var(--transition); min-height: 100vh; }
        .app-container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 1.5rem 1rem; }
        /* HEADER */
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1.2rem; transition: border-color var(--transition); }
        .logo { display: flex; align-items: center; gap: 0.6rem; cursor: pointer; user-select: none; }
        .logo-icon { font-size: 4rem; font-weight: 800; color: var(--text); transition: color var(--transition); position: relative; top: -8px; }
        .logo-text h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; color: var(--text); transition: color var(--transition); }
        .logo-text span { font-weight: 400; font-size: 0.78rem; color: var(--text-secondary); display: block; transition: color var(--transition); }
        .header-actions { display: flex; align-items: center; gap: 0.7rem; flex-wrap: wrap; }
        .search-wrapper { display: flex; align-items: center; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-xl); padding: 0.5rem 1rem; transition: all var(--transition); box-shadow: var(--shadow-sm); }
        .search-wrapper:focus-within { border-color: var(--active); box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06); }
        .search-wrapper i { color: var(--text-secondary); margin-right: 0.5rem; transition: color var(--transition); }
        #searchInput { border: none; outline: none; font-size: 0.95rem; background: transparent; width: 200px; font-weight: 500; color: var(--text); transition: color var(--transition); }
        #searchInput::placeholder { color: #9a9a9a; }
        .btn-icon { background: var(--surface); border: 1.5px solid var(--border); color: var(--text); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all var(--transition); font-size: 1rem; position: relative; box-shadow: var(--shadow-sm); }
        .btn-icon:hover { background: var(--active); color: var(--active-text); border-color: var(--active); }
        .btn-icon .badge { position: absolute; top: -4px; right: -4px; background: #e74c3c; color: #fff; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; font-weight: 700; display: flex; align-items: center; justify-content: center; display: none; }
        .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); border-radius: var(--radius-xl); padding: 0.5rem 1.3rem; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all var(--transition); white-space: nowrap; box-shadow: var(--shadow-sm); }
        .btn-outline:hover { background: var(--active); color: var(--active-text); border-color: var(--active); }
        /* ЖАНРИ */
        .category-section { margin-bottom: 1.8rem; }
        .category-scroll { display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; }
        .category-label { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-secondary); margin-right: 0.4rem; transition: color var(--transition); }
        .category-pill { background: var(--surface); border: 1.5px solid var(--border); color: var(--text); border-radius: var(--radius-xl); padding: 0.45rem 1.1rem; font-weight: 600; font-size: 0.8rem; cursor: pointer; transition: all var(--transition); white-space: nowrap; box-shadow: var(--shadow-sm); }
        .category-pill:hover { background: var(--hover); }
        .category-pill.active-pill { background: var(--active); color: var(--active-text); border-color: var(--active); }
        /* ВКЛАДКИ */
        .tabs-row { display: flex; gap: 0.3rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; color: var(--text-secondary); padding: 0.5rem 1.2rem; font-weight: 600; font-size: 0.9rem; cursor: pointer; border-radius: var(--radius-xl); transition: all var(--transition); }
        .tab-btn:hover { color: var(--text); background: var(--hover); }
        .tab-btn.active-tab { background: var(--active); color: var(--active-text); }
        /* СІТКА АНІМЕ */
        .anime-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 1.6rem; margin-top: 0.5rem; }
        .anime-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; transition: transform var(--transition), box-shadow var(--transition); box-shadow: var(--shadow-sm); border: 1px solid var(--border-light); cursor: pointer; position: relative; }
        .anime-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); border-color: #c0c0c0; }
        .card-img { position: relative; padding-top: 140%; background: #ebebeb; overflow: hidden; }
        .card-img img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s ease; }
        .anime-card:hover .card-img img { transform: scale(1.04); }
        .card-actions-overlay { position: absolute; bottom: 8px; right: 8px; display: flex; gap: 0.3rem; opacity: 0; transform: translateY(10px); transition: all var(--transition); z-index: 2; }
        .anime-card:hover .card-actions-overlay { opacity: 1; transform: translateY(0); }
        .card-action-btn { background: rgba(0, 0, 0, 0.7); color: #fff; border: none; border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.8rem; transition: all var(--transition); backdrop-filter: blur(4px); }
        .card-action-btn:hover { background: #000; transform: scale(1.1); }
        .card-action-btn.bookmarked { color: #f1c40f; }
        .card-info { padding: 0.9rem 1rem 1rem; }
        .card-info h3 { font-size: 0.9rem; font-weight: 700; margin-bottom: 0.3rem; color: var(--text); transition: color var(--transition); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta { display: flex; gap: 0.5rem; font-size: 0.7rem; color: var(--text-secondary); font-weight: 500; flex-wrap: wrap; transition: color var(--transition); }
        /* ПАГІНАЦІЯ */
        .pagination-row { display: flex; justify-content: center; align-items: center; gap: 0.6rem; margin-top: 2.5rem; flex-wrap: wrap; }
        .page-btn { background: var(--surface); border: 1.5px solid var(--border); color: var(--text); border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all var(--transition); box-shadow: var(--shadow-sm); }
        .page-btn:hover { background: var(--hover); }
        .page-btn.active-page { background: var(--active); color: var(--active-text); border-color: var(--active); }
        .page-btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }
        /* МОДАЛЬНІ ВІКНА */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(6px); z-index: 1000; justify-content: center; align-items: center; padding: 1rem; }
        .modal-content { background: var(--surface); max-width: 1000px; width: 100%; max-height: 90vh; border-radius: var(--radius-lg); overflow-y: auto; box-shadow: var(--shadow-lg); border: 1px solid var(--border); animation: fadeUp 0.25s ease; transition: background var(--transition), border-color var(--transition); }
        @keyframes fadeUp { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1.3rem 1.8rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 5; border-radius: var(--radius-lg) var(--radius-lg) 0 0; transition: background var(--transition), border-color var(--transition); }
        .modal-header h2 { font-size: 1.4rem; font-weight: 700; color: var(--text); transition: color var(--transition); }
        .close-modal { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: var(--text-secondary); transition: color var(--transition); padding: 0.3rem; line-height: 1; }
        .close-modal:hover { color: var(--text); }
        .modal-body { padding: 1.8rem; }
        .anime-detail-grid { display: flex; flex-wrap: wrap; gap: 2rem; }
        .detail-poster { flex: 0 0 170px; }
        .detail-poster img { width: 100%; border-radius: var(--radius-sm); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08); border: 1px solid var(--border); transition: border-color var(--transition); }
        .detail-info { flex: 1; min-width: 250px; }
        .synopsis { margin: 0.8rem 0; line-height: 1.6; color: var(--text-secondary); font-size: 0.9rem; transition: color var(--transition); }
        .tag { background: var(--tag-bg); display: inline-block; padding: 0.25rem 0.8rem; border-radius: 40px; font-size: 0.73rem; font-weight: 500; margin-right: 0.4rem; margin-bottom: 0.4rem; color: var(--text); transition: all var(--transition); }
        .btn-watch { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--active); color: var(--active-text); border: none; border-radius: var(--radius-xl); padding: 0.7rem 1.6rem; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all var(--transition); margin-top: 0.5rem; text-decoration: none; }
        .btn-watch:hover { opacity: 0.85; transform: translateY(-1px); }
        .player-container { position: relative; width: 100%; background: #000; border-radius: var(--radius-sm); overflow: hidden; margin-bottom: 1rem; }
        .player-container video { width: 100%; display: block; max-height: 60vh; background: #000; }
        /* ПРОФІЛЬ */
        .profile-section { text-align: center; margin-bottom: 1.8rem; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--tag-bg); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 2.5rem; color: var(--text); transition: all var(--transition); }
        .profile-stats { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin: 1rem 0; }
        .profile-stat { text-align: center; }
        .profile-stat .stat-num { font-size: 1.5rem; font-weight: 800; color: var(--text); transition: color var(--transition); }
        .profile-stat .stat-label { font-size: 0.7rem; color: var(--text-muted); transition: color var(--transition); }
        .bookmark-list { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-top: 1rem; }
        .bookmark-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 0.6rem 1rem; display: flex; align-items: center; gap: 0.6rem; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: all var(--transition); box-shadow: var(--shadow-sm); }
        .bookmark-item:hover { box-shadow: var(--shadow-md); }
        .bookmark-item img { width: 36px; height: 50px; object-fit: cover; border-radius: 8px; }
        /* TOAST */
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--active); color: var(--active-text); padding: 0.7rem 1.5rem; border-radius: var(--radius-xl); font-weight: 600; font-size: 0.85rem; z-index: 2000; transition: transform 0.3s ease; box-shadow: var(--shadow-lg); pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .loader { text-align: center; padding: 3rem; color: var(--text-secondary); font-weight: 500; grid-column: 1 / -1; transition: color var(--transition); }
        .loader i { font-size: 2rem; margin-bottom: 0.5rem; display: block; }
        footer { margin-top: 3rem; text-align: center; font-size: 0.7rem; border-top: 1px solid var(--border); padding-top: 1.8rem; color: var(--text-muted); transition: all var(--transition); }
        @media (max-width: 768px) {
            .app-container { padding: 1rem; }
            .anime-grid { gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .modal-body { padding: 1rem; }
            .detail-poster { flex-basis: 120px; }
            .header { gap: 0.8rem; }
            #searchInput { width: 140px; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- HEADER -->
    <div class="header">
        <div class="logo" id="logoHome">
            <div class="logo-icon">⎈</div>
            <div class="logo-text"><h1>MONOANIME</h1><span>чорно-білий каталог</span></div>
        </div>
        <div class="header-actions">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Пошук аніме..." autocomplete="off">
            </div>
            <button id="themeToggleBtn" class="btn-icon" title="Змінити тему"><i class="fas fa-moon"></i></button>
            <button id="profileBtn" class="btn-icon" title="Профіль"><i class="fas fa-user"></i><span class="badge" id="bookmarkBadge">0</span></button>
        </div>
    </div>

    <!-- ЖАНРИ (будуть заповнені динамічно) -->
    <div class="category-section">
        <div class="category-scroll" id="categoryScroll">
            <span class="category-label">Жанри:</span>
        </div>
    </div>

    <!-- ВКЛАДКИ -->
    <div class="tabs-row">
        <button class="tab-btn active-tab" data-tab="main">🏠 Головна</button>
        <button class="tab-btn" data-tab="bookmarks">⭐ Обрані</button>
        <button class="tab-btn" data-tab="history">🕒 Історія</button>
    </div>

    <!-- СІТКА АНІМЕ -->
    <div id="animeContainer" class="anime-grid">
        <div class="loader"><i class="fas fa-spinner fa-pulse"></i> Завантаження аніме...</div>
    </div>

    <!-- ПАГІНАЦІЯ -->
    <div class="pagination-row" id="paginationRow"></div>

    <footer><span>⚫ монохромний дизайн · джерело: AnimeUA · плеєр HLS</span></footer>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- МОДАЛЬНЕ ВІКНО ДЕТАЛЕЙ -->
<div id="animeModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h2 id="modalTitle">...</h2><button class="close-modal" id="closeModalBtn">&times;</button></div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<!-- МОДАЛЬНЕ ВІКНО ПЛЕЄРА -->
<div id="playerModal" class="modal">
    <div class="modal-content" style="max-width: 900px;">
        <div class="modal-header"><h2 id="playerModalTitle">🎬 Плеєр</h2><button class="close-modal" id="closePlayerBtn">&times;</button></div>
        <div class="modal-body">
            <div class="player-container"><video id="mainVideoPlayer" controls crossorigin="anonymous"></video></div>
        </div>
    </div>
</div>

<!-- МОДАЛЬНЕ ВІКНО ПРОФІЛЮ -->
<div id="profileModal" class="modal">
    <div class="modal-content" style="max-width: 700px;">
        <div class="modal-header"><h2>👤 Профіль користувача</h2><button class="close-modal" id="closeProfileBtn">&times;</button></div>
        <div class="modal-body" id="profileBody">
            <div class="profile-section">
                <div class="profile-avatar"><i class="fas fa-user-circle"></i></div>
                <h3 style="color:var(--text);">Аніме-фанат</h3>
                <p style="color:var(--text-secondary);">mono.anime@local</p>
            </div>
            <div class="profile-stats">
                <div class="profile-stat"><div class="stat-num" id="statBookmarks">0</div><div class="stat-label">Обрано</div></div>
                <div class="profile-stat"><div class="stat-num" id="statHistory">0</div><div class="stat-label">Переглянуто</div></div>
                <div class="profile-stat"><div class="stat-num" id="statWatched">0</div><div class="stat-label">Епізодів</div></div>
            </div>
            <h4>⭐ Обрані аніме</h4>
            <div class="bookmark-list" id="bookmarkList"><p>Немає обраних</p></div>
            <h4>🕒 Історія переглядів</h4>
            <div class="bookmark-list" id="historyList"><p>Немає історії</p></div>
            <button class="btn-outline" id="clearHistoryBtn" style="margin-top:1rem;"><i class="fas fa-trash-alt"></i> Очистити історію</button>
        </div>
    </div>
</div>

<script>
(function() {
    /* ==================== УТИЛІТИ ==================== */
    const PROXY_URL = 'https://monoanime.animegran8.workers.dev';
    const ANIMEUA_BASE = 'https://animeua.club';

    function getProxyUrl(url) {
        if (!url) {
            console.warn('[MONOANIME] getProxyUrl отримав порожній URL');
            return null;
        }
        return PROXY_URL + '?url=' + encodeURIComponent(url);
    }

    String.prototype.hashCode = function() {
        let hash = 0;
        for (let i = 0; i < this.length; i++) {
            hash = ((hash << 5) - hash) + this.charCodeAt(i);
            hash |= 0;
        }
        return Math.abs(hash);
    };

    function safeQuery(selector, parent = document) {
        try {
            if (typeof selector !== 'string' || !selector) return null;
            return parent.querySelector(selector);
        } catch (e) {
            console.warn('[MONOANIME] Invalid selector:', selector, e);
            return null;
        }
    }

    function safeQueryAll(selector, parent = document) {
        try {
            if (typeof selector !== 'string' || !selector) return [];
            return Array.from(parent.querySelectorAll(selector));
        } catch (e) {
            console.warn('[MONOANIME] Invalid selector:', selector, e);
            return [];
        }
    }

    function debounce(fn, delay) {
        let timer;
        return function(...args) {
            clearTimeout(timer);
            timer = setTimeout(() => fn.apply(this, args), delay);
        };
    }

    /* ==================== DOM ==================== */
    const DOM = {
        animeContainer: document.getElementById('animeContainer'),
        searchInput: document.getElementById('searchInput'),
        themeToggleBtn: document.getElementById('themeToggleBtn'),
        profileBtn: document.getElementById('profileBtn'),
        bookmarkBadge: document.getElementById('bookmarkBadge'),
        categoryScroll: document.getElementById('categoryScroll'),
        paginationRow: document.getElementById('paginationRow'),
        toast: document.getElementById('toast'),
        modal: document.getElementById('animeModal'),
        modalTitle: document.getElementById('modalTitle'),
        modalBody: document.getElementById('modalBody'),
        closeModalBtn: document.getElementById('closeModalBtn'),
        playerModal: document.getElementById('playerModal'),
        playerModalTitle: document.getElementById('playerModalTitle'),
        closePlayerBtn: document.getElementById('closePlayerBtn'),
        mainVideoPlayer: document.getElementById('mainVideoPlayer'),
        profileModal: document.getElementById('profileModal'),
        closeProfileBtn: document.getElementById('closeProfileBtn'),
        profileBody: document.getElementById('profileBody')
    };

    function showToast(msg) {
        DOM.toast.textContent = msg;
        DOM.toast.classList.add('show');
        clearTimeout(DOM.toast._timeout);
        DOM.toast._timeout = setTimeout(() => DOM.toast.classList.remove('show'), 2200);
    }

    /* ==================== СХОВИЩЕ ==================== */
    const Storage = {
        getBookmarks() {
            try { return JSON.parse(localStorage.getItem('mono_anime_bookmarks') || '[]'); } catch { return []; }
        },
        saveBookmarks(arr) {
            localStorage.setItem('mono_anime_bookmarks', JSON.stringify(arr));
        },
        getHistory() {
            try { return JSON.parse(localStorage.getItem('mono_anime_history') || '[]'); } catch { return []; }
        },
        addHistory(anime) {
            if (!anime || !anime.mal_id) return;
            const hist = this.getHistory().filter(h => h.mal_id !== anime.mal_id);
            hist.unshift({
                mal_id: anime.mal_id,
                title: anime.title,
                image_url: anime.images?.jpg?.large_image_url || '',
                url: anime.url || '',   // ДОДАНО: зберігаємо URL
                score: anime.score,
                year: anime.year,
                timestamp: Date.now()
            });
            localStorage.setItem('mono_anime_history', JSON.stringify(hist.slice(0, 50)));
        },
        clearHistory() {
            localStorage.setItem('mono_anime_history', '[]');
        },
        getTheme() {
            return localStorage.getItem('mono_anime_theme') || 'light';
        },
        setTheme(theme) {
            localStorage.setItem('mono_anime_theme', theme);
        }
    };

    function updateBadge() {
        const count = Storage.getBookmarks().length;
        DOM.bookmarkBadge.textContent = count;
        DOM.bookmarkBadge.style.display = count > 0 ? 'flex' : 'none';
    }

    function applyTheme(theme) {
        if (theme === 'dark') {
            document.body.classList.add('dark-mode');
            DOM.themeToggleBtn.innerHTML = '<i class="fas fa-sun"></i>';
        } else {
            document.body.classList.remove('dark-mode');
            DOM.themeToggleBtn.innerHTML = '<i class="fas fa-moon"></i>';
        }
    }
    function toggleTheme() {
        const next = Storage.getTheme() === 'dark' ? 'light' : 'dark';
        Storage.setTheme(next);
        applyTheme(next);
    }

    /* ==================== ANIMEUA ПАРСИНГ ==================== */
    async function fetchUA(url) {
        if (!url || typeof url !== 'string' || url.trim() === '') {
            throw new Error('fetchUA: порожній URL');
        }
        const proxyUrl = getProxyUrl(url);
        if (!proxyUrl) throw new Error('fetchUA: не вдалося створити проксі-URL');
        console.log('[MONOANIME] fetchUA:', url);
        const resp = await fetch(proxyUrl);
        if (!resp.ok) throw new Error(`Помилка завантаження: ${resp.status}`);
        const html = await resp.text();
        return new DOMParser().parseFromString(html, 'text/html');
    }

    function parseCards(doc) {
        const cards = safeQueryAll('.poster', doc);
        if (cards.length > 0) {
            return cards.map(card => {
                const linkEl = card.tagName === 'A' ? card : safeQuery('a', card);
                const href = linkEl?.getAttribute('href') || '';
                const img = safeQuery('img', card);
                const posterSrc = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
                const titleEl = safeQuery('.poster__title', card) || safeQuery('h3', card) || safeQuery('.title', card);
                const title = (titleEl?.textContent || '').trim() || 'Без назви';
                return {
                    mal_id: href.hashCode(),
                    title: title,
                    url: href.startsWith('http') ? href : ANIMEUA_BASE + href,
                    images: { jpg: { large_image_url: posterSrc.startsWith('http') ? posterSrc : (posterSrc ? ANIMEUA_BASE + posterSrc : '') } },
                    score: null,
                    year: null,
                    from: 'animeua'
                };
            });
        }
        const links = safeQueryAll('a[href*="/anime/"]', doc);
        const unique = new Map();
        links.forEach(a => {
            const href = a.href;
            if (!unique.has(href)) unique.set(href, a);
        });
        return Array.from(unique.values()).map(a => {
            const img = safeQuery('img', a);
            const src = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
            const title = (safeQuery('.poster__title', a)?.textContent || a.textContent || '').trim();
            return {
                mal_id: a.href.hashCode(),
                title: title || 'Без назви',
                url: a.href,
                images: { jpg: { large_image_url: src.startsWith('http') ? src : ANIMEUA_BASE + src } },
                score: null,
                year: null,
                from: 'animeua'
            };
        });
    }

    async function fetchGenres() {
        try {
            const doc = await fetchUA(ANIMEUA_BASE);
            const genreLinks = safeQueryAll('.genre-nav a, .genres-list a, a[href*="/genre/"]', doc);
            const genres = genreLinks.map(a => {
                const href = a.getAttribute('href');
                const slug = href.match(/\/genre\/([^/]+)/)?.[1] || '';
                const name = a.textContent.trim();
                return { slug, name };
            }).filter(g => g.slug && g.name);
            const unique = [];
            const seen = new Set();
            for (const g of genres) {
                if (!seen.has(g.slug)) {
                    seen.add(g.slug);
                    unique.push(g);
                }
            }
            return unique.slice(0, 25);
        } catch (e) {
            console.warn('[MONOANIME] Не вдалося завантажити жанри:', e);
            return [
                { slug: '1', name: 'Action' },
                { slug: '2', name: 'Adventure' },
                { slug: '3', name: 'Comedy' },
                { slug: '4', name: 'Drama' },
                { slug: '5', name: 'Fantasy' },

    /* ==================== ПАРСИНГ ДЕТАЛЬНОЇ СТОРІНКИ ==================== */
    async function loadAnimeDetails(animeUrl) {
        console.log('[MONOANIME] Завантаження деталей:', animeUrl);
        const doc = await fetchUA(animeUrl);

        let title = '';
        for (const sel of ['.page__subcol-main h1', '.pmovie__title', 'h1.title', 'h1']) {
            const el = safeQuery(sel, doc);
            if (el?.textContent.trim()) {
                title = el.textContent.trim();
                break;
            }
        }

        let poster = '';
        for (const sel of ['div.page__subcol-side .img-fit-cover img', '.pmovie__poster img', '.anime__poster img']) {
            const el = safeQuery(sel, doc);
            if (el) {
                const src = el.getAttribute('data-src') || el.getAttribute('src') || '';
                if (src) {
                    poster = src.startsWith('http') ? src : ANIMEUA_BASE + src;
                    break;
                }
            }
        }

        const genres = safeQueryAll('.pmovie__genres a, .genres a', doc).map(a => a.textContent.trim()).filter(Boolean);

        const yearEl = safeQuery('.pmovie__year, .release-year', doc);
        const yearText = yearEl?.textContent || '';
        const yearMatch = yearText.match(/\d{4}/);
        const year = yearMatch ? parseInt(yearMatch[0]) : null;

        let synopsis = '';
        for (const sel of ['.full-text', '.pmovie__description', '.anime__description']) {
            const el = safeQuery(sel, doc);
            if (el?.textContent.trim()) {
                synopsis = el.textContent.trim();
                break;
            }
        }

        const playerUrl = await extractPlayerIframeUrl(doc);
        let episodes = [];
        if (playerUrl) {
            console.log('[MONOANIME] Знайдено плеєр:', playerUrl);
            try {
                const playerHtml = await fetchUA(playerUrl);
                const text = playerHtml.body?.innerHTML || '';
                let allSources = extractSourcesFromText(text);

                if (allSources.length === 0) {
                    const nestedIframe = safeQuery('iframe[src]', playerHtml);
                    if (nestedIframe) {
                        let nestedUrl = nestedIframe.getAttribute('src');
                        if (nestedUrl.startsWith('//')) nestedUrl = 'https:' + nestedUrl;
                        if (!nestedUrl.startsWith('http')) nestedUrl = ANIMEUA_BASE + nestedUrl;
                        console.log('[MONOANIME] Вкладений iframe:', nestedUrl);
                        const nestedHtml = await fetchUA(nestedUrl);
                        const nestedText = nestedHtml.body?.innerHTML || '';
                        allSources = extractSourcesFromText(nestedText);
                    }
                }

                console.log('[MONOANIME] Знайдено джерел:', allSources.length);
                episodes = allSources.map((s, idx) => {
                    const parts = (s.label || '').split('/').map(p => p.trim());
                    const season = (s.label || '').match(/[Сс]езон\s*(\d+)/)?.[1] || '1';
                    const epMatch = (s.label || '').match(/[Сс]ері[яіяа]\s*(\d+)|[Ее]п\.?\s*(\d+)/);
                    const episode = epMatch ? (epMatch[1] || epMatch[2]) : String(idx + 1);
                    return {
                        title: s.label || `Серія ${idx+1}`,
                        season: season,
                        episode: episode,
                        poster: s.poster || poster,
                        file: s.file,
                        dub: parts[0] || 'UA',
                        quality: s.label?.match(/\[(\d+p)\]/)?.[1] || ''
                    };
                }).filter(ep => ep.file);
            } catch (e) {
                console.error('[MONOANIME] Помилка парсингу плеєра:', e);
            }
        } else {
            console.warn('[MONOANIME] Плеєр не знайдено');
        }

        return {
            mal_id: animeUrl.hashCode(),
            title,
            images: { jpg: { large_image_url: poster, image_url: poster } },
            genres,
            year,
            synopsis,
            score: null,
            episodes,
            playerUrl,
            url: animeUrl,
            from: 'animeua'
        };
    }

    async function extractPlayerIframeUrl(doc) {
        const selectors = [
            '.video-responsive iframe',
            '.player-responsive iframe',
            '#player iframe',
            'iframe[src*="kodik"]',
            'iframe[src*="alloha"]',
            'iframe[src*="animeua"]',
            'iframe[src*="player"]'
        ];
        for (const sel of selectors) {
            const el = safeQuery(sel, doc);
            if (el) {
                let src = el.getAttribute('src') || el.getAttribute('data-src');
                if (src) {
                    if (src.startsWith('//')) src = 'https:' + src;
                    if (!src.startsWith('http')) src = ANIMEUA_BASE + src;
                    return src;
                }
            }
        }
        const scripts = safeQueryAll('script:not([src])', doc);
        for (const script of scripts) {
            const text = script.textContent;
            const match = text.match(/(?:playerUrl|iframeUrl)\s*=\s*['"]([^'"]+)['"]/);
            if (match) {
                let url = match[1];
                if (url.startsWith('//')) url = 'https:' + url;
                return url;
            }
            const kodikMatch = text.match(/['"](?:https?:)?\/\/(?:kodik|alloha|tortuga)[^'"]+['"]/);
            if (kodikMatch) {
                let url = kodikMatch[0].replace(/['"]/g, '');
                if (url.startsWith('//')) url = 'https:' + url;
                return url;
            }
        }
        return null;
    }

    function extractSourcesFromText(text) {
        const sources = [];

        const m1 = text.match(/['"]file['"]\s*:\s*['"]([^'"]+\.m3u8[^'"]*)['"]/);
        if (m1) sources.push({ label: 'm3u8', file: m1[1].trim() });

        const m2 = text.match(/['"]file['"]\s*:\s*(\[[\s\S]{0,8000}?\])/);
        if (m2) {
            try {
                const arr = JSON.parse(m2[1]);
                const walk = (items, dub) => {
                    items.forEach(item => {
                        if (item.folder) {
                            walk(item.folder, item.title || dub);
                        } else if (item.file) {
                            sources.push({
                                label: (dub ? dub + ' / ' : '') + (item.title || ''),
                                file: item.file,
                                poster: item.poster || ''
                            });
                        }
                    });
                };
                walk(arr, '');
            } catch (e) {
                console.warn('[MONOANIME] file JSON parse:', e);
            }
        }

        const m3 = text.match(/sources\s*:\s*(\[[\s\S]{0,5000}?\])/);
        if (m3) {
            try {
                const normalized = m3[1]
                    .replace(/(['"])?([a-zA-Z_$][a-zA-Z0-9_$]*)(['"])?\s*:/g, '"$2":')
                    .replace(/'/g, '"');
                const parsed = JSON.parse(normalized);
                parsed.forEach(s => {
                    if (s.file || s.src) {
                        sources.push({ label: s.label || s.type || 'stream', file: s.file || s.src });
                    }
                });
            } catch (e) {
                console.warn('[MONOANIME] sources parse:', e);
            }
        }

        const urls = text.match(/https?:\/\/[^\s'"<>]+\.(m3u8|mp4)[^\s'"<>]*/g) || [];
        urls.forEach(url => {
            if (!sources.some(s => s.file === url)) {
                sources.push({ label: 'direct', file: url });
            }
        });

        const jwMatch = text.match(/jwplayer\s*\([^)]+\)\s*\.setup\s*\(\s*(\{[\s\S]{0,5000}?\})\s*\)/);
        if (jwMatch) {
            const inner = jwMatch[1].match(/['"]file['"]\s*:\s*['"]([^'"]+)['"]/);
            if (inner) sources.push({ label: 'jwplayer', file: inner[1] });
        }

        return sources;
    }

    /* ==================== ПЛЕЄР ==================== */
    let hlsInstance = null;

    function destroyHls() {
        if (hlsInstance) {
            hlsInstance.destroy();
            hlsInstance = null;
        }
    }

    function loadVideo(url) {
        destroyHls();
        DOM.mainVideoPlayer.src = '';

        if (!url || typeof url !== 'string' || url.trim() === '') {
            console.warn('[MONOANIME] loadVideo: порожній URL відео');
            showToast('❌ Відео недоступне (некоректне посилання)');
            return;
        }

        console.log('[MONOANIME] Завантаження відео:', url);
        const finalUrl = getProxyUrl(url);
        if (!finalUrl) {
            showToast('❌ Помилка створення посилання');
            return;
        }

        const isHLS = url.includes('.m3u8');

        if (isHLS && Hls.isSupported()) {
            hlsInstance = new Hls({
                enableWorker: true,
                lowLatencyMode: false,
                backBufferLength: 90
            });
            hlsInstance.loadSource(finalUrl);
            hlsInstance.attachMedia(DOM.mainVideoPlayer);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                DOM.mainVideoPlayer.play().catch(() => {});
                showToast('▶ Відтворення');
            });
            hlsInstance.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    console.warn('[MONOANIME] HLS fatal error, спроба відновлення');
                    destroyHls();
                    DOM.mainVideoPlayer.src = finalUrl;
                    DOM.mainVideoPlayer.play().catch(() => {});
                }
            });
        } else if (isHLS && DOM.mainVideoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
            DOM.mainVideoPlayer.src = finalUrl;
            DOM.mainVideoPlayer.play().catch(() => {});
            showToast('▶ Відтворення (native HLS)');
        } else {
            DOM.mainVideoPlayer.src = finalUrl;
            DOM.mainVideoPlayer.play().catch(() => {});
            showToast('▶ Відтворення');
        }
    }

    function playEpisode(title, file) {
        if (!file || typeof file !== 'string' || file.trim() === '') {

            return;
        }
        DOM.playerModalTitle.textContent = title;
        DOM.playerModal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
        loadVideo(file);
    }

    function renderPagination() {
        if (totalPages <= 1) {
            DOM.paginationRow.innerHTML = '';
            return;
        }
        let html = '';
        html += `<button class="page-btn" data-page="${currentPage - 1}" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
        const start = Math.max(1, currentPage - 2);
        const end = Math.min(totalPages, currentPage + 2);
        if (start > 1) html += '<span style="color:var(--text-muted);">…</span>';
        for (let i = start; i <= end; i++) {
            html += `<button class="page-btn ${i === currentPage ? 'active-page' : ''}" data-page="${i}">${i}</button>`;
        }
        if (end < totalPages) html += '<span style="color:var(--text-muted);">…</span>';
        html += `<button class="page-btn" data-page="${currentPage + 1}" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
        DOM.paginationRow.innerHTML = html;

        DOM.paginationRow.querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = parseInt(btn.dataset.page);
                if (page && page >= 1 && page <= totalPages && page !== currentPage) {
                    currentPage = page;
                    loadContent();
                    window.scrollTo({ top: 200, behavior: 'smooth' });
                }
            });
        });
    }

            ? bookmarks.slice(0, 12).map(b => `<div class="bookmark-item" data-url="${b.url || ''}"><img src="${b.image_url}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 36 50%22%3E%3Crect fill=%22%23ccc%22 width=%2236%22 height=%2250%22/%3E%3C/svg%3E'"><span>${b.title}</span></div>`).join('')
            : '<p>Немає обраних</p>';

        const histList = document.getElementById('historyList');
        histList.innerHTML = history.length
            ? history.slice(0, 12).map(h => `<div class="bookmark-item" data-url="${h.url || ''}"><img src="${h.image_url}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 36 50%22%3E%3Crect fill=%22%23ccc%22 width=%2236%22 height=%2250%22/%3E%3C/svg%3E'"><span>${h.title}</span></div>`).join('')
            : '<p>Немає історії</p>';

        // Додаємо можливість клікати по закладках/історії
        bmList.querySelectorAll('.bookmark-item').forEach(item => {
            item.addEventListener('click', () => {
                const url = item.dataset.url;
                if (url) {
                    closeProfileModal();
                    openDetailModal(url);
                }
            });
        });
        histList.querySelectorAll('.bookmark-item').forEach(item => {
            item.addEventListener('click', () => {
                const url = item.dataset.url;
                if (url) {
                    closeProfileModal();
                    openDetailModal(url);
                }
            });
        });

        DOM.profileModal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    /* ==================== ЗАВАНТАЖЕННЯ КОНТЕНТУ ==================== */
    async function loadContent() {
        DOM.animeContainer.innerHTML = '<div class="loader"><i class="fas fa-spinner fa-pulse"></i> Завантаження...</div>';
        DOM.paginationRow.innerHTML = '';

        try {
            if (currentTab === 'bookmarks') {
                currentList = Storage.getBookmarks();
                totalPages = 1;
                renderCards(currentList);
                return;
            }
            if (currentTab === 'history') {
                currentList = Storage.getHistory();
                totalPages = 1;
                renderCards(currentList);
                return;
            }

            if (currentSearchQuery) {
                currentList = await searchAnimeUA(currentSearchQuery, currentPage);
                totalPages = 5;
            } else if (currentGenreSlug) {
                currentList = await fetchByGenre(currentGenreSlug, currentPage);
                totalPages = 5;
            } else {
                currentList = await fetchMainPage(currentPage);
                totalPages = 5;
            }

            renderCards(currentList);
        } catch (err) {
            console.error('[MONOANIME] loadContent error:', err);
            DOM.animeContainer.innerHTML = `<div class="loader"><i class="fas fa-exclamation-triangle"></i> Помилка завантаження: ${err.message}</div>`;
            showToast('❌ Помилка завантаження');
        }
    }

    function resetToMain() {
        currentTab = 'main';
        currentPage = 1;
        currentSearchQuery = '';
        currentGenreSlug = null;
        DOM.searchInput.value = '';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        document.querySelector('[data-tab="main"]').classList.add('active-tab');
        document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active-pill'));
        const allPill = document.querySelector('.category-pill[data-genre=""]');
        if (allPill) allPill.classList.add('active-pill');
        loadContent();
    }

    /* ==================== ЖАНРИ ==================== */
    async function initGenres() {
        const genres = await fetchGenres();
        const scroll = DOM.categoryScroll;
        const existingPills = scroll.querySelectorAll('.category-pill');
        existingPills.forEach(p => p.remove());

        const allBtn = document.createElement('button');
        allBtn.className = 'category-pill active-pill';
        allBtn.dataset.genre = '';
        allBtn.textContent = 'Усі';
        allBtn.addEventListener('click', () => {
            currentGenreSlug = null;
            currentPage = 1;
            document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active-pill'));
            allBtn.classList.add('active-pill');
            loadContent();
        });
        scroll.appendChild(allBtn);

        genres.forEach(genre => {
            const btn = document.createElement('button');
            btn.className = 'category-pill';
            btn.dataset.genre = genre.slug;
            btn.textContent = genre.name;
            btn.addEventListener('click', () => {
                currentGenreSlug = genre.slug;
                currentPage = 1;
                currentSearchQuery = '';
                DOM.searchInput.value = '';
                document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active-pill'));
                btn.classList.add('active-pill');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
                document.querySelector('[data-tab="main"]').classList.add('active-tab');
                currentTab = 'main';
                loadContent();
            });
            scroll.appendChild(btn);
        });
    }

    /* ==================== ПІДПИСКА НА ПОДІЇ ==================== */
    DOM.themeToggleBtn.addEventListener('click', toggleTheme);
    DOM.profileBtn.addEventListener('click', openProfileModal);
    DOM.closeModalBtn.addEventListener('click', closeModal);
    DOM.closePlayerBtn.addEventListener('click', closePlayerModal);
    DOM.closeProfileBtn.addEventListener('click', closeProfileModal);
    document.getElementById('logoHome').addEventListener('click', resetToMain);

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.dataset.tab;
            currentTab = tab;
            currentPage = 1;
            currentSearchQuery = '';
            currentGenreSlug = null;
            DOM.searchInput.value = '';
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            btn.classList.add('active-tab');
            document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active-pill'));
            const allPill = document.querySelector('.category-pill[data-genre=""]');
            if (allPill) allPill.classList.add('active-pill');
            loadContent();
        });
    });

    DOM.searchInput.addEventListener('input', debounce(() => {
        currentSearchQuery = DOM.searchInput.value.trim();
        currentPage = 1;
        currentGenreSlug = null;
        currentTab = 'main';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
        document.querySelector('[data-tab="main"]').classList.add('active-tab');
        document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active-pill'));
        const allPill = document.querySelector('.category-pill[data-genre=""]');
        if (allPill) allPill.classList.add('active-pill');
        loadContent();
    }, 500));

    window.addEventListener('click', (e) => {
        if (e.target === DOM.modal) closeModal();
        if (e.target === DOM.playerModal) closePlayerModal();
        if (e.target === DOM.profileModal) closeProfileModal();
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeModal();
            closePlayerModal();
            closeProfileModal();
        }
    });
    document.getElementById('clearHistoryBtn').addEventListener('click', () => {
        Storage.clearHistory();
        openProfileModal();
        if (currentTab === 'history') loadContent();
    });

    // Старт
    applyTheme(Storage.getTheme());
    updateBadge();
    initGenres().then(() => loadContent());
})();
</script>
</body>
</html>
