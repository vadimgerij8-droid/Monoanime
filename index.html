<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>VakDab • твій аніме каталог</title>
    <link rel="preconnect" href="https://monoanime.animegran8.workers.dev" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <meta property="og:title" content="VakDab - твій аніме каталог" />
    <meta property="og:description" content="Сучасна платформа для перегляду аніме" />
    <meta property="og:type" content="website" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <meta name="theme-color" content="#0d0d0d" />

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js"
            }
        }
    </script>

    <style>
        :root {
            --accent: #0b0b0b;
            --accent-rgb: 11, 11, 11;
            --accent-hover: #1a1a1a;
            --accent-text: #ffffff;
            --accent-gradient: linear-gradient(135deg, #0b0b0b, #1a1a1a);
            --accent-light: rgba(11, 11, 11, 0.15);
            --accent-glow: rgba(11, 11, 11, 0.35);
            --bg: #ffffff;
            --surface: rgba(255, 255, 255, 0.98);
            --text: #0b0b0b;
            --text-secondary: #4a4a4a;
            --text-muted: #7a7a7a;
            --border: #e9e9e9;
            --border-light: #f3f3f3;
            --border-hover: #d0d0d0;
            --hover: rgba(0, 0, 0, 0.03);
            --tag-bg: #f6f6f6;
            --glass: rgba(255, 255, 255, 0.6);
            --glass-dark: rgba(20, 20, 20, 0.35);
            --blur-amount: 8px;
            --shadow-sm: 0 6px 18px rgba(11, 11, 11, 0.06);
            --shadow-md: 0 14px 32px rgba(11, 11, 11, 0.10);
            --shadow-lg: 0 30px 60px rgba(11, 11, 11, 0.14);
            --radius-sm: 12px;
            --radius: 16px;
            --radius-md: 14px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --transition: 280ms cubic-bezier(.2, .9, .2, 1);
            --transition-smooth: 360ms cubic-bezier(.2, .9, .2, 1);
            --agnative-scale: 1;
            --hero-extra-width: 1.3cm;
        }

        .dark-mode {
            --accent: #f7f7f7;
            --accent-rgb: 247, 247, 247;
            --accent-hover: #cfcfcf;
            --accent-text: #0a0a0a;
            --accent-gradient: linear-gradient(135deg, #f7f7f7, #cfcfcf);
            --accent-light: rgba(247, 247, 247, 0.15);
            --accent-glow: rgba(247, 247, 247, 0.35);
            --bg: #0a0a0a;
            --surface: rgba(20, 20, 20, 0.95);
            --text: #f7f7f7;
            --text-secondary: #cfcfcf;
            --text-muted: #9a9a9a;
            --border: #222222;
            --border-light: #151515;
            --border-hover: #3a3a3a;
            --hover: rgba(255, 255, 255, 0.02);
            --tag-bg: #141414;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-dark: rgba(0, 0, 0, 0.45);
            --shadow-sm: 0 6px 18px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 14px 32px rgba(0, 0, 0, 0.55);
            --shadow-lg: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            height: 100%;
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background var(--transition-smooth), color var(--transition-smooth);
            line-height: 1.5;
            overflow-x: hidden;
            font-size: 16px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 0.75rem 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: clip;
        }
        @media (min-width:480px) {
            .app-container { padding: 0 1rem 2.5rem; }
        }
        @media (min-width:1024px) {
            .app-container { padding: 0 2rem 3rem; }
            .hero-wrapper { width: calc(100% + 4rem); margin-left: -2rem; margin-right: -2rem; }
        }

        @keyframes fadeInUp {
            from { opacity:0; transform:translateY(16px); }
            to { opacity:1; transform:translateY(0); }
        }
        @keyframes subtlePulse {
            0%,100% { transform:scale(1); }
            50% { transform:scale(1.02); }
        }
        @keyframes scaleIn {
            from { opacity:0; transform:scale(0.92); }
            to { opacity:1; transform:scale(1); }
        }
        @keyframes spin { to { transform:rotate(360deg); } }
        @keyframes skeletonShimmer {
            0% { background-position:-200px 0; }
            100% { background-position:calc(200px + 100%) 0; }
        }
        @keyframes heroFadeIn {
            from { opacity:0; transform:scale(1.04) rotate(0.5deg); }
            to { opacity:1; transform:scale(1) rotate(0); }
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 0.8rem 0.4rem;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 30;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            backdrop-filter: none !important;
            transition: all var(--transition);
            pointer-events: none;
        }
        .header>* {
            pointer-events: auto;
        }

        @media (min-width:480px) {
            .header { padding: 0.8rem 1rem 0.5rem; gap: 0.8rem; }
        }
        @media (min-width:768px) {
            .header { padding: 1rem 1.2rem 0.6rem; gap: 1rem; }
        }
        @media (min-width:1024px) {
            .header { padding: 1.2rem 1.5rem 0.8rem; gap: 1.2rem; }
        }

        /* ===== HERO BANNER v2 — Black & White Glassmorphism ===== */
        .hero-wrapper {
            position: relative;
            width: calc(100% + 1.5rem);
            max-width: none;
            margin-left: -0.75rem;
            margin-right: -0.75rem;
            margin-top: 0;
            border-radius: 0;
            overflow: hidden;
            box-shadow: none;
            background: #0a0a0a;
            height: 100vh;
            height: 100svh;
            min-height: 500px;
        }
        @media (max-width: 768px) {
            .hero-wrapper {
                height: 100vh;
                height: 100svh;
                min-height: 400px;
                width: calc(100% + 2rem);
                margin-left: -1rem;
                margin-right: -1rem;
                margin-top: 0;
            }
        }
        @media (max-width: 480px) {
            .hero-wrapper {
                height: 100vh;
                height: 100svh;
                min-height: 360px;
                width: calc(100% + 1.5rem);
                margin-left: -0.75rem;
                margin-right: -0.75rem;
                margin-top: 0;
            }
        }
        body:not(.dark-mode) .hero-wrapper {
            background: #0a0a0a;
            margin-top: 0;
        }

        #heroSlidesContainer {
            position: absolute;
            inset: 0;
        }

        .hero-slide {
            display: none;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .hero-slide.active {
            display: block;
            animation: heroFadeIn 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Background with grayscale → color on hover */
        .hero-slide-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center top;
            filter: grayscale(0) contrast(1);
            transform: scale(1.08);
            transition: transform 8s ease, filter 0.6s ease;
        }
        .hero-slide.active .hero-slide-bg {
            transform: scale(1);
        }
        .hero-wrapper:hover .hero-slide-bg {
            filter: grayscale(0) contrast(1);
        }

        /* Gradient overlays — B&W glassmorphism */
        .hero-slide-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top,
                rgba(10,10,10,0.95) 0%,
                rgba(10,10,10,0.7) 25%,
                rgba(10,10,10,0.3) 55%,
                rgba(10,10,10,0.1) 80%,
                transparent 100%);
            z-index: 1;
        }
        .hero-slide-overlay::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg,
                rgba(10,10,10,0.6) 0%,
                transparent 50%);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        body:not(.dark-mode) .hero-slide-overlay {
            background: linear-gradient(to top,
                rgba(10,10,10,0.92) 0%,
                rgba(10,10,10,0.6) 25%,
                rgba(10,10,10,0.2) 55%,
                rgba(10,10,10,0.05) 80%,
                transparent 100%);
        }

        /* Content container */
        .hero-slide-content {
            position: absolute;
            inset: 0;
            bottom: auto;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            text-align: left;
            gap: clamp(10px, 1.8vh, 24px);
            padding: 90px 20px 140px;
            height: 100%;
            box-sizing: border-box;
            background: transparent;
        }

        /* Rating badge — glassmorphism */
        .hero-rating-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .hero-rating-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff !important;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            letter-spacing: 0.3px;
        }
        .hero-rating-badge .star {
            color: #fff;
            font-size: 0.8rem;
            filter: drop-shadow(0 0 4px rgba(255,255,255,0.3));
        }
        .hero-meta {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.10);
            color: rgba(255,255,255,0.8) !important;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.78rem;
            font-weight: 500;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            letter-spacing: 0.3px;
        }
        .hero-meta-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            display: inline-block;
        }

        /* Title */
        .hero-slide-title {
            font-size: clamp(1.5rem, 4.5vw, 3.5rem);
            font-weight: 800;
            color: #ffffff !important;
            line-height: 1.15;
            text-align: left;
            text-shadow: 0 2px 30px rgba(0,0,0,0.8);
            max-width: 80%;
            letter-spacing: -0.5px;
        }
        @media (max-width: 480px) {
            .hero-slide-title {
                font-size: 1.5rem;
                max-width: 92%;
            }
        }

        /* Synopsis */
        .hero-slide-desc {
            color: rgba(255,255,255,0.75) !important;
            font-size: clamp(0.85rem, 1.2vw, 1rem);
            line-height: 1.6;
            max-width: 55%;
            text-align: left;
            text-shadow: 0 1px 8px rgba(0,0,0,0.5);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin: 0;
        }
        @media (max-width: 768px) {
            .hero-slide-desc {
                max-width: 85%;
                -webkit-line-clamp: 2;
            }
        }
        @media (max-width: 480px) {
            .hero-slide-desc {
                max-width: 92%;
                font-size: 0.82rem;
                -webkit-line-clamp: 2;
            }
        }

        /* Tags */
        .hero-slide-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            text-align: left;
        }
        .hero-tag {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.92) !important;
            padding: 5px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 500;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            text-shadow: 0 1px 6px rgba(0,0,0,0.3);
            letter-spacing: 0.3px;
            transition: all 0.25s ease;
        }
        .hero-tag.genre-tag {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.82) !important;
        }
        .hero-tag:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.25);
            transform: translateY(-1px);
        }

        /* Button — glassmorphism */
        .hero-slide-btn-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        @media (max-width: 480px) {
            .hero-slide-btn-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.7rem;
            }
        }
        .hero-slide-btn-row .hero-rating-row {
            flex-wrap: wrap;
        }
        .hero-slide-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.18);
            color: #ffffff !important;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            text-decoration: none;
            letter-spacing: 0.5px;
            text-shadow: 0 1px 6px rgba(0,0,0,0.2);
            box-shadow: 0 4px 24px rgba(0,0,0,0.25);
        }
        .hero-slide-btn:hover {
            background: rgba(255,255,255,0.22);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.30);
        }
        .hero-slide-btn:active {
            transform: translateY(-1px) scale(1);
        }
        .hero-slide-btn .btn-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        .hero-slide-btn:hover .btn-icon {
            background: rgba(255,255,255,0.25);
            transform: translateX(3px);
        }
        @media (max-width: 480px) {
            .hero-slide-btn {
                padding: 12px 28px;
                font-size: 0.9rem;
            }
        }

        /* Navigation arrows — glassmorphism */
        .hero-nav {
            position: absolute;
            bottom: clamp(70px, 10vh, 130px);
            width: 46px;
            height: 46px;
            background: rgba(10,10,10,0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            padding: 0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .hero-nav:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.12);
            color: #fff;
            border-color: rgba(255,255,255,0.25);
            box-shadow: 0 8px 32px rgba(0,0,0,0.35);
        }
        .hero-nav-prev { left: 24px; }
        .hero-nav-next { right: 24px; }

        /* Dot indicators */
        .hero-dots {
            position: absolute;
            bottom: clamp(30px, 5.5vh, 72px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 20;
            align-items: center;
        }
        .hero-dot {
            width: 24px;
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.25);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .hero-dot.active {
            background: #ffffff;
            width: 40px;
            box-shadow: 0 0 8px rgba(255,255,255,0.3);
        }

        /* Auto-play progress bar */
        .hero-progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.08);
            z-index: 25;
        }
        .hero-progress-fill {
            height: 100%;
            width: 0%;
            background: rgba(255,255,255,0.6);
            transition: width 0.1s linear;
        }

        @media (min-width: 480px) {
            .hero-slide-content { padding: 90px 5% 140px; }
            .hero-nav { width: 46px; height: 46px; font-size: 1.1rem; }
        }
        @media (min-width: 768px) {
            .hero-slide-content { padding: 100px 6% 150px; }
            .hero-nav {
                bottom: clamp(70px, 10vh, 130px);
                width: 52px;
                height: 52px;
                font-size: 1.2rem;
            }
            .hero-nav-prev { left: 32px; }
            .hero-nav-next { right: 32px; }
        }
        @media (min-width: 1024px) {
            .hero-slide-content { padding: 100px 8% 150px; }
        }
        @media (max-width: 480px) {
            .hero-slide-content {
                padding: 80px 16px 130px;
                gap: clamp(10px, 1.5vh, 18px);
            }
            .hero-nav {
                bottom: 70px;
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
            .hero-nav-prev { left: 16px; }
            .hero-nav-next { right: 16px; }
            .hero-dots { bottom: 32px; gap: 6px; }
            .hero-dot { width: 18px; height: 2px; }
            .hero-dot.active { width: 30px; }
        }

        .dark-mode .hero-slide-content { background: transparent; }

        .anime-card {
            background: var(--surface);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            cursor: pointer;
            overflow: hidden;
            position: relative;
            animation: fadeInUp 0.5s ease both;
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 160px;
        }
        .anime-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }
        @media (min-width:480px) {
            .anime-card {
                border-radius: var(--radius);
                min-height: 180px;
            }
            .anime-card:hover {
                transform: translateY(-6px);
            }
        }

        .anime-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: #e0e0e0;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }
        .dark-mode .anime-poster {
            background: #2a2a2a;
        }
        .anime-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .anime-card:hover .anime-poster img {
            transform: scale(1.05);
        }

        .anime-title-under {
            padding: 0.4rem 0.3rem 0.35rem;
            font-weight: 700;
            font-size: 0.75rem;
            line-height: 1.2;
            color: var(--text);
            text-align: center;
            background: transparent;
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-word;
            min-height: 2.2em;
        }
        @media (min-width:480px) {
            .anime-title-under {
                font-size: 0.8rem;
                padding: 0.45rem 0.35rem 0.4rem;
                min-height: 2.4em;
            }
        }
        @media (min-width:768px) {
            .anime-title-under {
                font-size: 0.85rem;
                padding: 0.5rem 0.4rem 0.4rem;
                min-height: 2.6em;
            }
        }

        .grid-3cols {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin-top: 0.5rem;
            flex: 1;
        }
        @media (min-width:480px) {
            .grid-3cols { gap: 1rem; }
        }
        @media (min-width:1024px) {
            .grid-3cols { gap: 1.6rem; }
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-top: 0.5rem;
            flex: 1;
        }
        @media (min-width:480px) {
            .anime-grid { gap: 1rem; }

            padding: 11px 0;
            border-radius: 11px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
        }
        .auth-card .google-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.18);
        }
        .auth-card .google-btn:active {
            transform: scale(0.98);
        }
        .auth-card .google-btn svg {
            width: 18px;
            height: 18px;
        }
        .auth-card .divider {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 12px;
        }
        .auth-card .divider::before,
        .auth-card .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .auth-card form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .auth-card .field {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .auth-card .field label {
            font-size: 12.5px;
            color: var(--text-muted);
            font-weight: 500;
        }
        .auth-card .field input {
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 13px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }
        .auth-card .field input::placeholder {
            color: var(--text-muted);
        }
        .auth-card .field input:focus {
            border-color: rgba(255, 255, 255, 0.35);
            background: rgba(255, 255, 255, 0.06);
        }
        .auth-card .field input:focus-visible {
            outline: 2px solid rgba(255, 255, 255, 0.4);
            outline-offset: 1px;
        }
        .auth-card .row-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12.5px;
        }
        .auth-card .row-between a {
            color: var(--text-muted);
            text-decoration: none;
        }
        .auth-card .row-between a:hover {
            color: var(--text);
        }
        .auth-card .remember {
            display: flex;
            align-items: center;
            gap: 7px;
            color: var(--text-muted);
        }
        .auth-card .remember input {
            accent-color: #fff;
            width: 14px;
            height: 14px;
        }
        .auth-card .submit-btn {
            margin-top: 4px;
            width: 100%;
            padding: 12px 0;
            border-radius: 11px;
            border: none;
            background: var(--accent);
            color: var(--accent-text);
            font-family: inherit;
            font-size: 14.5px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, background 0.2s ease;
        }
        .auth-card .submit-btn:hover {
            background: var(--accent-hover);
        }
        .auth-card .submit-btn:active {
            transform: scale(0.98);
        }
        .auth-card .guest-btn {
            width: 100%;
            margin-top: 10px;
            padding: 11px 0;
            border-radius: 11px;
            border: 1px dashed var(--border);
            background: transparent;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }
        .auth-card .guest-btn:hover {
            color: var(--text);
            border-color: rgba(255, 255, 255, 0.28);
            background: rgba(255, 255, 255, 0.03);
        }
        .auth-card .guest-btn:active {
            transform: scale(0.98);
        }
        .auth-card .guest-btn svg {
            width: 15px;
            height: 15px;
            opacity: 0.8;
        }
        .auth-card .panel {
            display: none;
        }
        .auth-card .panel.active {
            display: flex;
            flex-direction: column;
        }
        .auth-card .foot-note {
            text-align: center;
            margin-top: 18px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .auth-card .foot-note button {
            background: none;
            border: none;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .auth-card .auth-error {
            color: #ff6b6b;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
            min-height: 20px;
        }
        .auth-card .auth-loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
    
        /* Logo always white text + blur backdrop */
        .logo-text h1,
        .logo-icon,
        .logo-text span {
            color: #ffffff !important;
            text-shadow: 0 1px 8px rgba(0,0,0,0.5);
        }
        body:not(.dark-mode) .logo-text h1,
        body:not(.dark-mode) .logo-icon,
        body:not(.dark-mode) .logo-text span {
            color: #ffffff !important;
        }
        /* Logo blur backdrop like the watch button */
        .logo {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 0.4rem 0.9rem 0.4rem 0.7rem;
            border-radius: 14px;
            background: rgba(255,255,255,0.12) !important;
            backdrop-filter: blur(18px) saturate(140%) !important;
            -webkit-backdrop-filter: blur(18px) saturate(140%) !important;
            border: 1px solid rgba(255,255,255,0.18) !important;
            transition: background 0.25s ease, box-shadow 0.25s ease;
            text-decoration: none;
        }
        .logo:hover {
            background: rgba(255,255,255,0.2) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .logo-title-row {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .logo-text h1 {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            line-height: 1.1;
            color: #ffffff !important;
        }
        .logo-text span {
            font-size: 0.7rem;
            opacity: 0.85;
            color: #ffffff !important;
            display: block;
            line-height: 1.2;
        }
        /* Hide clock */
        .agnative-topnav-clock {
            display: none !important;
        }

        /* ===== Header layout — burger + title + search в одному рядку ===== */
        .header-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex: 1;
            min-width: 0;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .header {
            align-items: center !important;
        }

        /* ===== Burger + Search buttons — glassmorphism blur ===== */
        .burger-btn,
        .search-circle-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12) !important;
            backdrop-filter: blur(18px) saturate(140%) !important;
            -webkit-backdrop-filter: blur(18px) saturate(140%) !important;
            border: 1px solid rgba(255,255,255,0.18) !important;
            color: #ffffff !important;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.25s ease, box-shadow 0.25s ease, transform 0.2s ease;
            box-shadow: none;
            flex-shrink: 0;
        }
        body:not(.dark-mode) .burger-btn,
        body:not(.dark-mode) .search-circle-btn {
            color: #ffffff !important;
        }
        .burger-btn:hover,
        .search-circle-btn:hover {
            background: rgba(255,255,255,0.22) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
            transform: scale(1.06);
        }
        .burger-btn i,
        .search-circle-btn i {
            color: #ffffff !important;
        }

        /* ====================================================================
           BOTTOM NAV BAR
           ==================================================================== */
        .bottom-nav {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: calc(100% - 32px);
            max-width: 420px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 26px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            transition: transform 0.3s cubic-bezier(.2,.9,.2,1), opacity 0.3s;
        }
        .dark-mode .bottom-nav {
            background: rgba(18, 18, 18, 0.72);
            border-color: rgba(255,255,255,0.08);
        }
        .bottom-nav.hidden-nav {
            transform: translateX(-50%) translateY(120%);
            opacity: 0;
            pointer-events: none;
        }
        .bn-item {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            position: relative;
            transition: transform 0.15s;
        }
        .bn-item:active {
            transform: scale(0.92);
        }
        .bn-pill {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 10px;
            border-radius: 50px;
            transition: background 0.22s cubic-bezier(.2,.9,.2,1), padding 0.22s cubic-bezier(.2,.9,.2,1), color 0.22s;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }
        .bn-item.active .bn-pill {
            background: var(--text);
            color: var(--bg);
            padding: 10px 18px;
        }
        .bn-pill svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.7;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
            transition: stroke 0.22s;
        }
        .bn-label {
            font-size: 13.5px;
            font-weight: 600;
            display: none;
        }
        .bn-item.active .bn-label {
            display: inline;
        }
        @media (min-width: 900px) {
            .bottom-nav { display: none; }
        }
        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            .bottom-nav {
                bottom: calc(12px + env(safe-area-inset-bottom));
            }
        }
        .app-container { padding-bottom: 90px !important; }
        /* Коли суспільне активне — прибираємо padding, чат займає весь екран */
        body.community-active .app-container { padding-bottom: 0 !important; }
        body.community-active #ratingPageContainer { padding: 0 !important; }

        /* ═══════════════════════════════════════════════════════
           RATING & COMMUNITY — v4 Black & White + Blur + Media
           ═══════════════════════════════════════════════════════ */

        #ratingPageContainer {
            display: none;
            min-height: 100vh;
            padding: 0;
            animation: fadeInUp 0.32s cubic-bezier(.2,.9,.2,1) both;
        }
        #ratingPageContainer.active { display: block; }

        /* ── Full-screen tabs (glass pill, no nav) ── */
        .rg-main-tabs {
            display: flex;
            gap: 4px;
            padding: 5px;
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            margin: 0.6rem 1rem;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .rg-main-tab {
            flex: 1;
            padding: 11px 6px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            color: var(--text-muted);
            transition: all .3s cubic-bezier(.2,.9,.2,1);
            border: none;
            background: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            font-family: inherit;
            min-height: 46px;
            letter-spacing: 0.01em;
            position: relative;
            overflow: hidden;
        }
        .rg-main-tab svg { width: 17px; height: 17px; flex-shrink: 0; }
        .rg-main-tab:hover { color: var(--text-secondary); }
        .rg-main-tab.active {
            background: var(--accent);
            color: var(--accent-text);
            box-shadow: 0 4px 16px rgba(var(--accent-rgb), 0.25);
        }

        .rg-tab-panel { display: none; animation: fadeInUp 0.3s ease; }
        .rg-tab-panel.active { display: block; }

        /* ══════════════ RATING PANEL ══════════════ */

        .rg-my-stats {
            margin: 0.8rem 1rem 0;
            background: var(--glass);
            backdrop-filter: blur(28px) saturate(1.5);
            -webkit-backdrop-filter: blur(28px) saturate(1.5);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.3rem;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }
        .rg-my-stats::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-hover), transparent);
        }
        .rg-stats-top {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.1rem;
        }
        .rg-stats-avatar {
            width: 56px; height: 56px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid var(--border);
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; font-weight: 700;
            background: var(--tag-bg);
            color: var(--text-secondary);
            box-shadow: 0 2px 10px rgba(var(--accent-rgb), 0.08);
        }
        .rg-stats-avatar img { width:100%; height:100%; object-fit:cover; filter: grayscale(40%) contrast(1.05); }
        .rg-stats-name {
            font-size: 17px; font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }
        .rg-stats-rank-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px; font-weight: 700;
            color: var(--accent-text);
            background: var(--accent);
            margin-top: 6px;
            letter-spacing: 0.3px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .rg-stats-rank-badge svg { width: 11px; height: 11px; }
        .rg-stats-grid {
            display: flex; gap: 8px;
        }
        .rg-stat-cell {
            flex: 1;
            background: rgba(var(--accent-rgb), 0.03);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 8px;
            text-align: center;
            transition: all .3s cubic-bezier(.2,.9,.2,1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .rg-stat-cell:hover {
            background: rgba(var(--accent-rgb), 0.06);
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(var(--accent-rgb), 0.06);
        }
        .rg-stat-val {
            font-size: 22px; font-weight: 800;
            color: var(--text);
            letter-spacing: -0.5px;
        }
        .rg-stat-label {
            font-size: 9px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1.2px;
            color: var(--text-muted); margin-top: 4px;
        }

        /* Achievements */
        .rg-achievements { margin: 1rem 1rem 0; }
        .rg-section-label {
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--text-secondary);
            padding: 0 2px 0.6rem;
        }
        .rg-ach-scroll {
            display: flex; gap: 0.55rem;
            overflow-x: auto;
            padding-bottom: 0.4rem;
            scrollbar-width: none;
        }
        .rg-ach-scroll::-webkit-scrollbar { display: none; }
        .rg-ach-item {
            flex-shrink: 0;
            display: flex; flex-direction: column; align-items: center;
            gap: 0.4rem;
            padding: 0.75rem 0.8rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            min-width: 76px;
            text-align: center;
            transition: all .3s cubic-bezier(.2,.9,.2,1);
        }
        .rg-ach-item.earned {
            border-color: rgba(var(--accent-rgb), 0.3);
            background: rgba(var(--accent-rgb), 0.04);
            box-shadow: 0 2px 12px rgba(var(--accent-rgb), 0.06);
        }
        .rg-ach-item.earned:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(var(--accent-rgb), 0.1);
        }
        .rg-ach-item.locked { opacity: 0.3; filter: grayscale(100%); }
        .rg-ach-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
        .rg-ach-icon svg { width: 24px; height: 24px; }
        .rg-ach-name {
            font-size: 10px; font-weight: 700;
            color: var(--text); line-height: 1.2;
        }
        .rg-ach-req { font-size: 9px; color: var(--text-muted); }

        /* Sort tabs */
        .rg-sort-tabs {
            display: flex; gap: 0.4rem;
            padding: 1rem 1rem 0.5rem;
            overflow-x: auto; scrollbar-width: none;
        }
        .rg-sort-tabs::-webkit-scrollbar { display: none; }
        .rg-sort-tab {
            flex-shrink: 0;
            padding: 7px 16px;
            font-size: 11px; font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all .3s cubic-bezier(.2,.9,.2,1);
            font-family: inherit;
            white-space: nowrap;
        }
        .rg-sort-tab:hover { border-color: var(--border-hover); color: var(--text-secondary); }
        .rg-sort-tab.active {
            color: var(--accent-text);
            border-color: var(--accent);
            background: var(--accent);
            box-shadow: 0 2px 10px rgba(var(--accent-rgb), 0.2);
        }

        .rg-lb-title {
            padding: 0 1rem 0.5rem;
            font-size: 11px; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--text-secondary);
        }

        /* Podium */
        .rg-podium {
            display: flex; align-items: flex-end; justify-content: center;
            gap: 0.6rem; padding: 0.5rem 1rem 0.3rem;
        }
        .rg-podium-item {
            flex: 1; max-width: 100px;
            display: flex; flex-direction: column; align-items: center; gap: 0.35rem;
            animation: floatIn 0.4s ease both;
        }
        .rg-podium-crown { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
        .rg-podium-crown svg { width: 100%; height: 100%; }
        .rg-podium-item.p1 .rg-podium-crown { width: 32px; height: 32px; }
        .rg-podium-item.p1 .rg-podium-crown svg { width: 100%; height: 100%; }
        .rg-podium-avatar {
            width: 50px; height: 50px; border-radius: 50%;
            overflow: hidden; border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; font-weight: 700;
            background: var(--tag-bg); color: var(--text-secondary);
            transition: transform .3s;
        }
        .rg-podium-item:hover .rg-podium-avatar { transform: scale(1.05); }
        .rg-podium-item.p1 .rg-podium-avatar { width: 68px; height: 68px; border-width: 3px; border-color: var(--text); }
        .rg-podium-item.p2 .rg-podium-avatar { border-color: var(--text-muted); }
        .rg-podium-item.p3 .rg-podium-avatar { border-color: var(--border-hover); }
        .rg-podium-avatar img { width:100%; height:100%; object-fit:cover; filter: grayscale(50%); }
        .rg-podium-name {
            font-size: 11px; font-weight: 700; color: var(--text);
            text-align: center; line-height: 1.2;
        }
        .rg-podium-score {
            font-size: 13px; font-weight: 800; color: var(--text);
        }
        .rg-podium-score .unit { font-size: 10px; font-weight: 500; color: var(--text-muted); margin-left: 2px; }
        .rg-podium-bar {
            width: 100%; border-radius: 8px 8px 0 0;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-bottom: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 900; color: var(--text);
        }
        .rg-podium-item.p1 .rg-podium-bar { height: 52px; background: rgba(var(--accent-rgb), 0.08); }
        .rg-podium-item.p2 .rg-podium-bar { height: 38px; }
        .rg-podium-item.p3 .rg-podium-bar { height: 28px; }

        /* Leaderboard list */
        .rg-lb-list { padding: 0.4rem 1rem 0.5rem; display: flex; flex-direction: column; gap: 7px; }
        .rg-lb-item {
            display: flex; align-items: center; gap: 0.7rem;
            padding: 10px 12px;
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all .3s cubic-bezier(.2,.9,.2,1);
        }
        .rg-lb-item:hover {
            border-color: var(--border-hover);
            transform: translateX(3px);
            box-shadow: var(--shadow-sm);
        }
        .rg-lb-item.is-me {
            border-color: rgba(var(--accent-rgb), 0.3);
            background: rgba(var(--accent-rgb), 0.04);
        }
        .rg-lb-num {
            font-size: 13px; font-weight: 800; color: var(--text-muted);
            min-width: 22px; text-align: center;
        }
        .rg-lb-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            overflow: hidden; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.78rem; font-weight: 700;
            background: var(--tag-bg); color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .rg-lb-avatar img { width:100%; height:100%; object-fit:cover; filter: grayscale(50%); }
        .rg-lb-info { flex: 1; min-width: 0; }
        .rg-lb-name {
            font-size: 13px; font-weight: 700; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .rg-lb-rank { font-size: 10px; font-weight: 600; margin-top: 1px; color: var(--text-muted); }
        .rg-lb-score {
            font-size: 16px; font-weight: 800; color: var(--text);
            white-space: nowrap;
        }
        .rg-lb-score .unit { font-size: 10px; font-weight: 500; color: var(--text-muted); margin-left: 2px; }
        .rg-daily-wrap { margin: 14px 0; }
        .rg-daily-header { display:flex; justify-content:space-between; align-items:center; font-size:13px; font-weight:700; color:var(--text); margin-bottom:8px; padding: 0 2px; }
        .rg-daily-count { font-size:11px; font-weight:700; color:var(--accent); background:rgba(128,128,128,.12); padding:2px 8px; border-radius:10px; }
        .dt-list { display:flex; flex-direction:column; gap:8px; }
        .dt-item { display:flex; gap:10px; align-items:flex-start; padding:10px 12px; border-radius:12px; background:var(--card-bg, rgba(128,128,128,.06)); border:1px solid var(--border, rgba(128,128,128,.12)); transition: opacity .2s; }
        .dt-item.done { opacity:.55; }
        .dt-check { width:20px; height:20px; border-radius:50%; border:2px solid var(--border, rgba(128,128,128,.3)); flex-shrink:0; display:flex; align-items:center; justify-content:center; margin-top:2px; }
        .dt-item.done .dt-check { background: var(--accent); border-color: var(--accent); color:#fff; }
        .dt-check svg { width:12px; height:12px; }
        .dt-body { flex:1; min-width:0; }
        .dt-desc { font-size:12.5px; font-weight:600; color:var(--text); margin-bottom:5px; }
        .dt-bar-wrap { height:5px; border-radius:3px; background:rgba(128,128,128,.15); overflow:hidden; margin-bottom:4px; }
        .dt-bar { height:100%; background:var(--accent); border-radius:3px; transition:width .3s; }
        .dt-meta { display:flex; justify-content:space-between; font-size:10.5px; color:var(--text-muted); }
        .dt-xp { color:var(--accent); font-weight:700; }
        .rg-lb-loader {
            display: flex; align-items: center; justify-content: center;
            padding: 2rem;
        }
        .rg-lb-content { display: block; }
        .rg-lb-empty {
            display: flex; flex-direction: column; align-items: center;
            gap: 0.8rem; padding: 2.5rem 1rem;
            color: var(--text-muted); text-align: center;
        }
        .rg-lb-empty svg { width: 40px; height: 40px; opacity: 0.15; }
        .rg-lb-empty p { font-size: 12.5px; max-width: 220px; line-height: 1.5; color: var(--text-muted); }

        /* ══════════════ COMMUNITY CHAT ══════════════ */

        .com-chat-wrap {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            min-height: 100dvh;
            position: relative;
        }
        @supports not (height: 100dvh) {
            .com-chat-wrap { height: 100vh; min-height: 100vh; }
        }

        .com-messages {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 1rem 0.9rem 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }
        .com-messages::-webkit-scrollbar { width: 4px; }
        .com-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .com-messages::-webkit-scrollbar-track { background: transparent; }

        /* Date separator */
        .com-date-sep {
            display: flex; align-items: center; gap: 0.7rem;
            padding: 0.6rem 0;
        }
        .com-date-sep::before, .com-date-sep::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .com-date-sep-text {
            font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
            color: var(--text-muted); white-space: nowrap;
            padding: 3px 10px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
        }

        /* Message bubble */
        .com-msg {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
            max-width: 84%;
            animation: fadeInUp 0.2s ease;
        }
        .com-msg.mine {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .com-msg-avatar {
            width: 30px; height: 30px; border-radius: 50%;
            overflow: hidden; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.72rem; font-weight: 700;
            background: var(--tag-bg); color: var(--text-secondary);
            border: 1px solid var(--border);
            align-self: flex-end;
        }
        .com-msg-avatar img { width:100%; height:100%; object-fit:cover; filter: grayscale(50%); }
        .com-msg.mine .com-msg-avatar { display: none; }

        .com-msg-col { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
        .com-msg.mine .com-msg-col { align-items: flex-end; }

        .com-msg-name {
            font-size: 10px; font-weight: 700;
            color: var(--text-secondary);
            padding: 0 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            letter-spacing: -0.1px;
        }
        .com-msg.mine .com-msg-name { display: none; }

        .com-msg-bubble {
            padding: 9px 13px;
            border-radius: 18px;
            font-size: 13.5px; line-height: 1.55;
            word-break: break-word; color: var(--text);
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border: 1px solid var(--border);
            position: relative;
            max-width: 100%;
        }
        .com-msg.mine .com-msg-bubble {
            background: rgba(var(--accent-rgb), 0.1);
            border-color: rgba(var(--accent-rgb), 0.2);
            border-bottom-right-radius: 5px;
        }
        .com-msg:not(.mine) .com-msg-bubble { border-bottom-left-radius: 5px; }

        /* type badge */
        .com-msg-type {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
            text-transform: uppercase; color: var(--text-muted);
            margin-bottom: 5px;
        }
        .com-msg-type svg { width: 10px; height: 10px; }

        /* Media in message */
        .com-msg-media {
            margin: 6px 0 2px;
            border-radius: 12px;
            overflow: hidden;
            max-width: 240px;
            border: 1px solid var(--border);
        }
        .com-msg-media img {
            width: 100%; display: block;
            filter: grayscale(30%);
        }
        .com-msg-media video {
            width: 100%; display: block;
            border-radius: 12px;
        }

        /* Text watermark */
        .com-msg-watermark {
            font-size: 8px;
            font-weight: 500;
            color: var(--text-muted);
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 2px 6px 0;
            text-align: right;
            white-space: nowrap;
        }
        .com-msg.mine .com-msg-watermark { text-align: right; }

        .com-msg-time {
            font-size: 9px; color: var(--text-muted);
            padding: 0 4px;
            align-self: flex-end;
        }

        /* Input area */
        .com-input-wrap {
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
            padding: 0.7rem 0.9rem;
            padding-bottom: calc(0.7rem + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: blur(28px) saturate(1.5);
            -webkit-backdrop-filter: blur(28px) saturate(1.5);
            flex-shrink: 0;
            position: relative;
        }

        /* Media preview */
        .com-media-preview {
            display: none;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.7rem 0;
            flex-wrap: wrap;
        }
        .com-media-preview.active { display: flex; }
        .com-media-thumb {
            position: relative;
            width: 54px; height: 54px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .com-media-thumb img,
        .com-media-thumb video {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(30%);
        }
        .com-media-remove {
            position: absolute;
            top: 2px; right: 2px;
            width: 18px; height: 18px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            border: none;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: #fff;
            padding: 0;
        }
        .com-media-remove svg { width: 10px; height: 10px; }

        .com-input-box {
            flex: 1;
            display: flex;
            align-items: flex-end;
            gap: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 7px 12px 7px 14px;
            transition: all .3s cubic-bezier(.2,.9,.2,1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .com-input-box:focus-within {
            border-color: rgba(var(--accent-rgb), 0.4);
            box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.06);
        }
        .com-input-box textarea {
            flex: 1; background: transparent;
            border: none; outline: none; resize: none;
            color: var(--text); font-size: 13.5px;
            font-family: inherit; min-height: 22px; max-height: 110px;
            line-height: 1.5; padding: 2px 0;
        }
        .com-input-box textarea::placeholder { color: var(--text-muted); }

        /* Attach button (photo/video) */
        .com-attach-btn {
            flex-shrink: 0;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            background: none; border: none; cursor: pointer;
            color: var(--text-muted); transition: color .2s;
            align-self: flex-end; margin-bottom: 2px;
            border-radius: 50%;
        }
        .com-attach-btn:hover { color: var(--text-secondary); background: rgba(var(--accent-rgb), 0.06); }
        .com-attach-btn svg { width: 18px; height: 18px; }

        /* Type selector button */
        .com-type-btn {
            flex-shrink: 0;
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            background: none; border: none; cursor: pointer;
            color: var(--text-muted); transition: color .2s;
            align-self: flex-end; margin-bottom: 2px;
            border-radius: 50%;
        }
        .com-type-btn:hover { color: var(--text-secondary); background: rgba(var(--accent-rgb), 0.06); }
        .com-type-btn svg { width: 17px; height: 17px; }
        .com-type-btn.active { color: var(--accent); }

        .com-send-btn {
            flex-shrink: 0;
            width: 42px; height: 42px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            color: var(--accent-text);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all .3s cubic-bezier(.2,.9,.2,1);
            box-shadow: 0 2px 12px rgba(var(--accent-rgb), 0.25);
        }
        .com-send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 18px rgba(var(--accent-rgb), 0.35);
        }
        .com-send-btn:active { transform: scale(0.95); }
        .com-send-btn:disabled { opacity: 0.35; cursor: default; transform: none; box-shadow: none; }
        .com-send-btn svg { width: 17px; height: 17px; }

        /* Type menu popup */
        .com-type-menu {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 0.9rem;
            background: var(--glass);
            backdrop-filter: blur(28px) saturate(1.5);
            -webkit-backdrop-filter: blur(28px) saturate(1.5);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 5px;
            display: flex; gap: 3px;
            z-index: 20;
            box-shadow: var(--shadow-md);
            animation: fadeInUp 0.2s ease;
        }
        .com-type-menu.hidden { display: none; }

        .com-type-opt {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 12px;
            font-size: 12px; font-weight: 600;
            color: var(--text-secondary);
            background: none; border: none;
            border-radius: 10px;
            cursor: pointer; transition: all .2s;
            font-family: inherit;
            white-space: nowrap;
        }
        .com-type-opt:hover { background: rgba(var(--accent-rgb), 0.06); color: var(--text); }
        .com-type-opt svg { width: 15px; height: 15px; }

        /* Filter tabs: Думка / Рекомендація / Досягнення */
        .com-filter-tabs {
            display: flex; gap: 0.4rem;
            padding: 0.7rem 0.9rem 0.6rem;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            overflow-x: auto; scrollbar-width: none;
        }
        .com-filter-tabs::-webkit-scrollbar { display: none; }
        .com-filter-tab {
            flex-shrink: 0;
            padding: 7px 16px;
            font-size: 11.5px; font-weight: 700;
            letter-spacing: 0.3px;
            color: var(--text-muted);
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all .3s cubic-bezier(.2,.9,.2,1);
            font-family: inherit;
            white-space: nowrap;
        }
        .com-filter-tab:hover { border-color: var(--border-hover); color: var(--text-secondary); }
        .com-filter-tab.active {
            color: var(--accent-text);
            border-color: var(--accent);
            background: var(--accent);
            box-shadow: 0 2px 10px rgba(var(--accent-rgb), 0.2);
        }

        /* Message action buttons (edit/delete) */
        .com-msg-actions { display: flex; gap: 4px; margin: 2px 4px 0; }
        .com-msg.mine .com-msg-actions { justify-content: flex-end; }
        .com-msg-action-btn {
            width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center;
            background: none; border: none; cursor: pointer;
            color: var(--text-muted); opacity: 0.6;
            transition: all .2s; padding: 0; border-radius: 50%;
        }
        .com-msg-action-btn:hover { opacity: 1; color: var(--text-secondary); background: rgba(var(--accent-rgb), 0.08); }
        .com-msg-action-btn svg { width: 12px; height: 12px; }
        .com-msg-edited-tag { font-size: 8.5px; color: var(--text-muted); opacity: 0.6; margin-left: 4px; }

        /* Inline edit box */
        .com-msg-edit-box { display: flex; flex-direction: column; gap: 6px; min-width: 180px; }
        .com-msg-edit-box textarea {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 7px 10px; color: var(--text);
            font-size: 13px; font-family: inherit; resize: none; min-height: 40px;
            outline: none; width: 100%;
        }
        .com-msg-edit-box textarea:focus { border-color: rgba(var(--accent-rgb), 0.4); }
        .com-msg-edit-actions { display: flex; gap: 6px; justify-content: flex-end; }
        .com-msg-edit-actions button {
            font-size: 11px; font-weight: 700; padding: 5px 12px;
            border-radius: 14px; border: 1px solid var(--border); cursor: pointer;
            font-family: inherit; background: var(--glass); color: var(--text-secondary);
        }
        .com-msg-edit-save { background: var(--accent) !important; color: var(--accent-text) !important; border-color: var(--accent) !important; }

        /* Compose extra panel (anime / achievement picker) */
        .com-compose-extra:empty { display: none; }
        .com-compose-extra { padding: 0 0.9rem 0.5rem; }

        .com-anime-search input, .com-ach-picker input {
            width: 100%; background: var(--surface); border: 1px solid var(--border);
            border-radius: 18px; padding: 8px 14px; color: var(--text);
            font-size: 13px; font-family: inherit; outline: none; margin-bottom: 6px;
            box-sizing: border-box;
        }
        .com-anime-results {
            display: flex; flex-direction: column; gap: 4px;
            max-height: 180px; overflow-y: auto; margin-bottom: 4px;
        }
        .com-anime-result-item {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 8px; border-radius: 10px; cursor: pointer;
            background: var(--glass); border: 1px solid var(--border);
            transition: all .2s;
        }
        .com-anime-result-item:hover { border-color: var(--border-hover); background: rgba(var(--accent-rgb), 0.06); }
        .com-anime-result-item img { width: 30px; height: 42px; object-fit: cover; border-radius: 6px; flex-shrink: 0; }
        .com-anime-result-item span { font-size: 12.5px; font-weight: 600; color: var(--text); }

        .com-anime-selected, .com-ach-selected {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; margin-bottom: 6px;
            border-radius: 14px; background: rgba(var(--accent-rgb), 0.06);
            border: 1px solid rgba(var(--accent-rgb), 0.2);
        }
        .com-anime-selected img { width: 38px; height: 54px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
        .com-anime-selected-info, .com-ach-selected-info { flex: 1; min-width: 0; }
        .com-anime-selected-title, .com-ach-selected-name { font-size: 12.5px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .com-anime-selected-desc, .com-ach-selected-req {
            font-size: 11px; color: var(--text-muted); margin-top: 2px;
            overflow: hidden; text-overflow: ellipsis;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
        }
        .com-anime-clear, .com-ach-clear {
            flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
            background: none; border: 1px solid var(--border); cursor: pointer;
            color: var(--text-muted); font-size: 14px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
        }
        .com-ach-selected-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; color: var(--accent); flex-shrink: 0; }
        .com-ach-selected-icon svg { width: 22px; height: 22px; }

        .com-ach-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
            gap: 6px; max-height: 180px; overflow-y: auto; margin-bottom: 4px;
        }
        .com-ach-opt {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 8px 4px; border-radius: 12px; cursor: pointer;
            background: var(--glass); border: 1px solid var(--border);
            font-family: inherit; transition: all .2s;
        }
        .com-ach-opt:hover { border-color: rgba(var(--accent-rgb), 0.4); background: rgba(var(--accent-rgb), 0.06); }
        .com-ach-opt-icon { width: 20px; height: 20px; color: var(--accent); }
        .com-ach-opt-icon svg { width: 18px; height: 18px; }
        .com-ach-opt-name { font-size: 9.5px; font-weight: 700; color: var(--text); text-align: center; line-height: 1.2; }
        .com-ach-empty { font-size: 12px; color: var(--text-muted); padding: 10px 0; text-align: center; }

        /* Rich anime card inside a chat message */
        .com-anime-card {
            display: flex; gap: 9px;
            margin: 6px 0 2px; padding: 8px;
            border-radius: 14px; cursor: pointer;
            background: rgba(var(--accent-rgb), 0.05);
            border: 1px solid rgba(var(--accent-rgb), 0.15);
            transition: all .2s; max-width: 260px;
        }
        .com-anime-card:hover { background: rgba(var(--accent-rgb), 0.1); border-color: rgba(var(--accent-rgb), 0.3); }
        .com-anime-card img { width: 48px; height: 68px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
        .com-anime-card-info { min-width: 0; }
        .com-anime-card-title { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 3px; }
        .com-anime-card-desc {
            font-size: 11px; color: var(--text-muted); line-height: 1.4;
            overflow: hidden; text-overflow: ellipsis;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
        }
        .com-anime-card-cta { font-size: 10px; font-weight: 700; color: var(--accent); margin-top: 4px; }

        /* Rich achievement card inside a chat message */
        .com-ach-card {
            display: flex; align-items: center; gap: 10px;
            margin: 6px 0 2px; padding: 9px 12px;
            border-radius: 14px;
            background: rgba(var(--accent-rgb), 0.05);
            border: 1px solid rgba(var(--accent-rgb), 0.15);
        }
        .com-ach-card-icon { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; color: var(--accent); flex-shrink: 0; }
        .com-ach-card-icon svg { width: 26px; height: 26px; }
        .com-ach-card-name { font-size: 13px; font-weight: 800; color: var(--text); }
        .com-ach-card-req { font-size: 10.5px; color: var(--text-muted); margin-top: 1px; }

        /* Modern chat header (Telegram-like group header) */
        .com-chat-header {
            display: flex; align-items: center; gap: 10px;
            padding: 0.75rem 0.9rem;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, rgba(var(--accent-rgb),0.08), transparent 60%);

                            Storage._setProfile(getDefaultProfile());

                        if (data.history) Storage._setHistory(data.history);
                        if (data.bookmarks) Storage._setBookmarks(data.bookmarks);
                        if (data.likes) Storage._setLikes(data.likes);
                        if (data.watchTime) Storage._setWatchTime(data.watchTime);
                    } else {

                        if (guestData.profile && guestData.profile.nickname && guestData.profile.nickname !== 'Користувач') {
                            Storage._setProfile(guestData.profile);

                            const p = getDefaultProfile();
                            p.nickname = this._user.displayName;
                            if (this._user.photoURL) p.avatar = this._user.photoURL;
                            Storage._setProfile(p);
                        } else {
                            Storage._setProfile(getDefaultProfile());

                        if (guestData.bookmarks && guestData.bookmarks.length) Storage._setBookmarks(guestData.bookmarks);
                        if (guestData.likes && Object.keys(guestData.likes).length) Storage._setLikes(guestData.likes);

                        p.nickname = this._user.displayName;
                        if (this._user.photoURL) p.avatar = this._user.photoURL;
                        Storage._setProfile(p);
                    } else {
                        Storage._setProfile(getDefaultProfile());
                    }
                                } finally {
                    this._loadingData = false;

            async _createUserDoc(uid) {
                if (!firebaseInitialized || !db) return;
                try {
                    let profile = Storage.getProfile() || getDefaultProfile();
                    // Доповнюємо з Google дані
                    if (this._user && this._user.displayName && (!profile.nickname || profile.nickname === 'Користувач')) {
                        profile.nickname = this._user.displayName;
                    }
                    if (this._user && this._user.photoURL && !profile.avatar) {
                        profile.avatar = this._user.photoURL;
                    }
                    Storage._setProfile(profile);
                    const docRef = doc(db, 'users', uid);
                    // Стискаємо фото для Firestore
                    const profileSync = JSON.parse(JSON.stringify(profile));
                    if (profileSync.avatar && profileSync.avatar.length > 100000) profileSync.avatar = '';
                    if (profileSync.banner && profileSync.banner.length > 100000) profileSync.banner = '';

                        return b;

            async logout() {
                if (!firebaseInitialized || !auth) {
                    return { success: false, error: 'Firebase not available' };
                }
                // 1. Скасувати відкладений debounce-таймер
                if (Storage._syncTimer) {
                    clearTimeout(Storage._syncTimer);
                    Storage._syncTimer = null;
                }

                showToast('Збереження даних і вихід...');

                // 2. СПОЧАТКУ синхронізуємо — чекаємо завершення (max 6с)
                // Storage.clear() викликається ТІЛЬКИ після запису в Firestore
                try {
                    const timeoutP = new Promise(r => setTimeout(r, 6000));
                    await Promise.race([this.syncUserData(), timeoutP]);
                    console.log('Logout: sync done');
                } catch(e) {
                    console.warn('Logout: sync error', e.message);
                }

                // 3. ТІЛЬКИ ПІСЛЯ синхронізації очищаємо стан і localStorage
                this._user = null;
                this._authResolved = true;
                this._welcomeShown = false;
                this._isGuest = false;
                Storage.clear();
                this._notifyListeners();

                // 4. Виходимо з Firebase Auth
