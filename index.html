<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MONOANIME • твій аніме каталог</title>
    <link rel="preconnect" href="https://monoanime.animegran8.workers.dev" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" as="style" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <meta property="og:title" content="MONOANIME - твій аніме каталог" />
    <meta property="og:description" content="Сучасна платформа для перегляду аніме" />
    <meta property="og:type" content="website" />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" defer></script>
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <meta name="theme-color" content="#0d0d0d" />

    <style>
        :root {
            --accent: #ffcc00;
            --accent-rgb: 255, 204, 0;
            --accent-hover: #e6b800;
            --accent-text: #0b0b0b;
            --accent-gradient: linear-gradient(135deg, #ffcc00, #f59e0b);
            --accent-light: rgba(255, 204, 0, 0.15);
            --accent-glow: rgba(255, 204, 0, 0.35);
            --primary: var(--accent);
            --primary-rgb: var(--accent-rgb);
            --primary-hover: var(--accent-hover);
            --bg: #ffffff;
            --surface: rgba(255, 255, 255, 0.98);
            --text: #0b0b0b;
            --text-secondary: #4a4a4a;
            --text-muted: #7a7a7a;
            --border: #e9e9e9;
            --border-light: #f3f3f3;
            --border-hover: #d0d0d0;
            --hover: rgba(0, 0, 0, 0.03);
            --active: #0b0b0b;
            --active-text: #ffffff;
            --tag-bg: #f6f6f6;
            --glass: rgba(255, 255, 255, 0.6);
            --glass-dark: rgba(20, 20, 20, 0.35);
            --blur-amount: 8px;
            --shadow-sm: 0 6px 18px rgba(11, 11, 11, 0.06);
            --shadow-md: 0 14px 32px rgba(11, 11, 11, 0.10);
            --shadow-lg: 0 30px 60px rgba(11, 11, 11, 0.14);
            --radius-sm: 12px;
            --radius: 16px;
            --radius-md: 14px;
            --radius-lg: 22px;
            --radius-xl: 28px;
            --transition: 280ms cubic-bezier(.2, .9, .2, 1);
            --transition-smooth: 360ms cubic-bezier(.2, .9, .2, 1);
            --sidebar-width: 340px;
            --agnative-scale: 1.15;
        }

        .dark-mode {
            --bg: #0a0a0a;
            --surface: rgba(20, 20, 20, 0.95);
            --text: #f7f7f7;
            --text-secondary: #cfcfcf;
            --text-muted: #9a9a9a;
            --border: #222222;
            --border-light: #151515;
            --border-hover: #3a3a3a;
            --hover: rgba(255, 255, 255, 0.02);
            --active: #f7f7f7;
            --active-text: #0a0a0a;
            --tag-bg: #141414;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-dark: rgba(0, 0, 0, 0.45);
            --shadow-sm: 0 6px 18px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 14px 32px rgba(0, 0, 0, 0.55);
            --shadow-lg: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        [data-theme="default"] {
            --accent: #ffcc00;
            --accent-rgb: 255, 204, 0;
            --accent-hover: #e6b800;
            --accent-text: #0b0b0b;
            --accent-gradient: linear-gradient(135deg, #ffcc00, #f59e0b);
            --accent-light: rgba(255, 204, 0, 0.15);
            --accent-glow: rgba(255, 204, 0, 0.35);
        }
        [data-theme="grayscale"] {
            --accent: #6b7280;
            --accent-rgb: 107, 114, 128;
            --accent-hover: #4b5563;
            --accent-text: #ffffff;
            --accent-gradient: linear-gradient(135deg, #9ca3af, #6b7280);
            --accent-light: rgba(107, 114, 128, 0.15);
            --accent-glow: rgba(107, 114, 128, 0.35);
        }
        [data-theme="gold"] {
            --accent: #d4a017;
            --accent-rgb: 212, 160, 23;
            --accent-hover: #b8860b;
            --accent-text: #0b0b0b;
            --accent-gradient: linear-gradient(135deg, #d4a017, #b8860b);
            --accent-light: rgba(212, 160, 23, 0.15);
            --accent-glow: rgba(212, 160, 23, 0.35);
        }
        [data-theme="blue"] {
            --accent: #3b82f6;
            --accent-rgb: 59, 130, 246;
            --accent-hover: #2563ed;
            --accent-text: #ffffff;
            --accent-gradient: linear-gradient(135deg, #60a5fa, #3b82f6);
            --accent-light: rgba(59, 130, 246, 0.15);
            --accent-glow: rgba(59, 130, 246, 0.35);
        }
        [data-theme="purple"] {
            --accent: #8b5cf6;
            --accent-rgb: 139, 92, 246;
            --accent-hover: #7c3aed;
            --accent-text: #ffffff;
            --accent-gradient: linear-gradient(135deg, #a78bfa, #8b5cf6);
            --accent-light: rgba(139, 92, 246, 0.15);
            --accent-glow: rgba(139, 92, 246, 0.35);
        }
        [data-theme="red"] {
            --accent: #ef4444;
            --accent-rgb: 239, 68, 68;
            --accent-hover: #dc2626;
            --accent-text: #ffffff;
            --accent-gradient: linear-gradient(135deg, #f87171, #ef4444);
            --accent-light: rgba(239, 68, 68, 0.15);
            --accent-glow: rgba(239, 68, 68, 0.35);
        }
        [data-theme="green"] {
            --accent: #22c55e;
            --accent-rgb: 34, 197, 94;
            --accent-hover: #16a34a;
            --accent-text: #ffffff;
            --accent-gradient: linear-gradient(135deg, #4ade80, #22c55e);
            --accent-light: rgba(34, 197, 94, 0.15);
            --accent-glow: rgba(34, 197, 94, 0.35);
        }
        [data-theme] {
            --primary: var(--accent);
            --primary-rgb: var(--accent-rgb);
            --primary-hover: var(--accent-hover);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html,
        body {
            height: 100%;
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background var(--transition-smooth), color var(--transition-smooth);
            line-height: 1.5;
            overflow-x: hidden;
        }
        .app-container {
            max-width: 1320px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem 3rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes subtlePulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.02);
            }
        }
        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes leftdockSlideIn {
            from {
                transform: translateX(-130%) translateY(-50%);
                opacity: 0;
            }
            to {
                transform: translateX(0) translateY(-50%);
                opacity: 1;
            }
        }
        @keyframes skeletonShimmer {
            0% {
                background-position: -200px 0;
            }
            100% {
                background-position: calc(200px + 100%) 0;
            }
        }
        @keyframes floatUpDown {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .glass {
            background: linear-gradient(180deg, var(--glass), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .img--blur {
            filter: blur(10px) scale(1.02);
            transform-origin: center;
            transition: filter 600ms ease, transform 600ms ease;
        }
        .img--loaded {
            filter: blur(0) scale(1);
        }
        .small {
            font-size: 0.85rem;
        }

        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 1.8rem;
            padding-bottom: 1.4rem;
            border-bottom: 1px solid var(--border);
            transition: all var(--transition);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .burger-btn {
            background: var(--surface);
            border: 2px solid var(--border);
            color: var(--text);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.3rem;
            box-shadow: var(--shadow-sm);
            position: relative;
            z-index: 30;
        }
        .burger-btn:hover {
            background: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
            transform: scale(1.1);
            box-shadow: 0 8px 24px var(--accent-glow);
        }
        .burger-btn.active {
            background: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            user-select: none;
            text-decoration: none;
            transition: transform var(--transition);
        }
        .logo:hover {
            transform: translateY(-2px);
        }
        .logo-icon {
            font-size: 3.6rem;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .logo:hover .logo-icon {
            transform: rotate(-8deg) scale(1.12);
            filter: brightness(1.1);
        }
        .logo-text h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            color: var(--text);
            margin: 0;
            transition: color var(--transition);
        }
        .logo-text span {
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            display: block;
            margin-top: -4px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.9rem;
            flex-wrap: wrap;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 0.55rem 1rem;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            min-width: 280px;
            backdrop-filter: blur(4px);
        }
        .search-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light), var(--shadow-md);
            transform: translateY(-2px);
        }
        .search-wrapper i {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-right: 0.65rem;
            transition: color var(--transition);
        }
        .search-wrapper:focus-within i {
            color: var(--accent);
        }
        #searchInput {
            border: none;
            outline: none;
            font-size: 0.97rem;
            background: transparent;
            width: 100%;
            font-weight: 500;
            color: var(--text);
            font-family: inherit;
            padding: 0;
        }
        #searchInput::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }
        .search-clear {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 0.2rem;
            margin-left: 0.4rem;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .search-clear.visible {
            opacity: 0.7;
            visibility: visible;
            pointer-events: auto;
        }
        .search-clear:hover {
            opacity: 1;
            color: var(--accent);
            background: var(--hover);
            transform: scale(1.1);
        }
        .search-shortcut {
            font-size: 0.65rem;
            background: var(--tag-bg);
            color: var(--text-muted);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            margin-left: 0.4rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            white-space: nowrap;
            pointer-events: none;
            user-select: none;
        }

        .btn-icon {
            background: var(--surface);
            border: 2px solid var(--border);
            color: var(--text);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.15rem;
            position: relative;
            box-shadow: var(--shadow-sm);
        }
        .btn-icon:hover {
            background: var(--accent);
            color: var(--accent-text);
            border-color: var(--accent);
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 8px 24px var(--accent-glow);
        }

        /* LEFTDOCK */
        .leftdock-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(3px);
            z-index: 40;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .leftdock-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .agnative-leftdock {
            position: fixed !important;
            left: 1em !important;
            top: 45% !important;
            transform: translateX(-130%) translateY(-50%) !important;
            z-index: 50 !important;
            width: max-content !important;
            max-width: 16em !important;
            max-height: 80vh !important;
            overflow-y: auto !important;
            display: inline-flex !important;
            flex-direction: column !important;
            padding: .32em !important;
            border-radius: 1.35em !important;
            background: rgba(22, 24, 30, .42) !important;
            border: 1px solid rgba(255, 255, 255, .10) !important;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .10), 0 12px 32px rgba(0, 0, 0, .28) !important;
            backdrop-filter: blur(22px) saturate(140%) !important;
            -webkit-backdrop-filter: blur(22px) saturate(140%) !important;
            font-size: calc(clamp(0.92rem, 0.5rem + 1.4vmin, 1.7rem) * var(--agnative-scale, 1)) !important;
            opacity: 0 !important;
            pointer-events: none !important;
            transition: transform .28s cubic-bezier(.22, .61, .36, 1), opacity .2s ease !important;
        }
        .agnative-leftdock.is-visible {
            transform: translateX(0) translateY(-50%) !important;
            opacity: 1 !important;
            pointer-events: auto !important;
        }
        .agnative-leftdock::-webkit-scrollbar {
            width: 3px;
        }
        .agnative-leftdock::-webkit-scrollbar-track {
            background: transparent;
        }
        .agnative-leftdock::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 10px;
        }
        .agnative-leftdock__inner {
            display: flex;
            flex-direction: column;
            gap: .12em;
        }
        .agnative-leftdock__case {
            display: flex;
            flex-direction: column;
            gap: .04em;
        }
        .agnative-leftdock__split {
            height: 1px;
            margin: .3em .4em;
            background: rgba(255, 255, 255, .10);
        }
        .agnative-leftdock__item.selector {
            appearance: none;
            -webkit-appearance: none;
            border: 0;
            background: none;
            color: rgba(255, 255, 255, .92);
            min-height: 2.6em;
            display: flex;
            align-items: center;
            gap: .35em;
            padding: .4em .9em;
            border-radius: 999px;
            font-size: .92em;
            font-weight: 700;
            line-height: 1.1;
            white-space: nowrap;
            transition: background .2s ease, transform .2s ease, box-shadow .2s ease;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            text-align: left;
        }
        .agnative-leftdock__item.selector:hover,
        .agnative-leftdock__item.selector.is-active {
            background: rgba(255, 255, 255, .16) !important;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .14) !important;
            transform: translateX(.04em) !important;
        }
        .agnative-leftdock__item .menu__ico {
            width: 1.5em;
            height: 1.5em;
            min-width: 1.5em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            margin-right: .3em !important;
            color: currentColor;
        }
        .agnative-leftdock__item .menu__ico svg {
            width: 1.5em;
            height: 1.5em;
            color: currentColor;
        }
        .agnative-leftdock__item .menu__text {
            display: inline-block;
            flex: 1 1 auto;
        }

        /* КАРУСЕЛЬ */
        .carousel {
            position: relative;
            margin-bottom: 1.8rem;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            background: var(--surface);
            border: 1px solid var(--border);
        }
        .carousel-inner {
            position: relative;
            width: 100%;
            overflow: hidden;
        }
        .carousel-inner::after {
            content: '';
            display: block;
            padding-top: 42%;
        }
        .carousel-items {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.6s ease;
            will-change: transform;
        }
        .carousel-item {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            position: relative;
            display: none;
            align-items: center;
            justify-content: center;
            background: #0b0b0b;
            cursor: pointer;
        }
        .carousel-item.active {
            display: flex;
        }
        .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0.85;
        }
        .carousel-caption {
            position: relative;
            z-index: 2;
            color: #fff;
            text-align: center;
            padding: 1.5rem;
            max-width: 80%;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
        }
        .carousel-caption h3 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }
        .carousel-control {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.4);
            border: none;
            color: #fff;
            font-size: 2.5rem;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: background var(--transition), transform var(--transition);
            backdrop-filter: blur(6px);
        }
        .carousel-control:hover {
            background: rgba(0, 0, 0, 0.65);
            transform: translateY(-50%) scale(1.08);
        }
        .carousel-control-prev {
            left: 1rem;
        }
        .carousel-control-next {
            right: 1rem;
        }
        .carousel-indicators {
            position: absolute;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            z-index: 10;
        }
        .carousel-indicators button {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid transparent;
            cursor: pointer;
            padding: 0;
            transition: all var(--transition);
        }
        .carousel-indicators button.active {
            background: var(--accent);
            border-color: #fff;
            transform: scale(1.2);
        }

        /* СІТКА */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
            gap: 1.6rem;
            margin-top: 0.5rem;
            flex: 1;
        }
        .anime-card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            height: 100%;
            animation: fadeInUp 0.5s ease both;
            overflow: hidden;
        }
        .anime-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-md);
            border-color: var(--accent);
        }
        .anime-poster {
            position: relative;
            padding-top: 140%;
            background: #e0e0e0;
            overflow: hidden;
            border-radius: var(--radius) var(--radius) 0 0;
        }
        .dark-mode .anime-poster {
            background: #2a2a2a;
        }
        .anime-poster img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.35s ease;
        }
        .anime-card:hover .anime-poster img {
            transform: scale(1.06);
        }
        .anime-info {

    </style>
</head>
<body data-theme="default">
    <div class="app-container">
        <!-- ХЕДЕР -->
        <div class="header">

            <div class="header-actions">

        <!-- ОВЕРЛЕЙ LEFTDOCK -->

        <!-- LEFTDOCK -->
        <aside class="agnative-leftdock" id="leftdock" aria-label="Головне меню">
            <div class="agnative-leftdock__inner" id="leftdockInner"></div>
        </aside>

        <!-- КАРУСЕЛЬ -->
        <div id="featuredCarousel" class="carousel">
            <div class="carousel-inner"><div class="carousel-items"></div></div>
            <button class="carousel-control carousel-control-prev" data-carousel-slide="prev" title="Попередній (←)">‹</button>
            <button class="carousel-control carousel-control-next" data-carousel-slide="next" title="Наступний (→)">›</button>
            <div class="carousel-indicators"></div>

        <!-- ДІЇ -->
        <div class="actions-row" id="actionsRow">
            <button class="action-pill" id="top100Btn" title="ТОП 100 аніме"><i class="fas fa-crown"></i> ТОП 100</button>

        </div>
        <div class="pagination-row" id="paginationRow"></div>

        <footer><span>MONOANIME &copy; 2026 — Усі права захищено • Клавіші: / пошук, M меню, T тема, R випадкове, ← → карусель, Esc закрити</span></footer>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

        <div class="modal-content">
            <div class="modal-header"><h2 id="modalTitle">...</h2><button class="close-modal" id="closeModalBtn" title="Закрити (Esc)">&times;</button></div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- МОДАЛКА ПЛЕЄРА -->
    <div id="playerModal" class="modal" role="dialog" aria-modal="true">
        <div class="modal-content" style="max-width:900px;">
            <div class="modal-header"><h2>Плеєр</h2><button class="close-modal" id="closePlayerBtn" title="Закрити (Esc)">&times;</button></div>
            <div class="modal-body">
                <div class="player-wrapper" id="lampaPlayerWrapper"></div>
                <div id="playerLoading" class="loader" style="display:none;"><i class="fas fa-spinner fa-pulse"></i> Завантаження...</div>
            </div>
        </div>
    </div>

    <script>
        // ========================================================================
        //  MONOANIME — ОЧИЩЕНА ВЕРСІЯ (без профілю/обраного/історії)
        // ========================================================================

        const PROXY_URL = 'https://monoanime.animegran8.workers.dev';
        const ANIMEUA_BASE = 'https://animeua.club';
        const GENRE_MAP = {
            "Бойові мистецтва": "boivie",
            "Бойовики": "boyovik",
            "Воєнні": "voenne",
            "Гарем": "garems",
            "Драми": "drama",
            "Детектив": "detektiv",
            "Демони": "demons",
            "Комедії": "komik",
            "Роботи": "meha",
            "Повсякденність": "posyardnevnist",
            "Пригоди": "adventures",
            "Психологічні": "psih",
            "Романтика": "romantik",
            "Надприродні": "weird",
            "Фантастика": "fantastika",
            "Фентезі": "fentezi",
            "Школа": "classes",
            "Еччі": "echhi"
        };

        String.prototype.hashCode = function() { let h = 0; for (let i = 0; i < this.length; i++) { h = ((h << 5) - h) + this
                    .charCodeAt(i);
                h |= 0; } return Math.abs(h); };

        function safeQuery(sel, parent) { try { return (parent || document).querySelector(sel); } catch { return null; } }

        function safeQueryAll(sel, parent) { try { return Array.from((parent || document).querySelectorAll(sel)); } catch {
                return []; } }

        function getProxyUrl(url) { if (!url) return null; return PROXY_URL + '?url=' + encodeURIComponent(url); }

        // ==================== ТЕМИ ====================
        const Storage = {
            getTheme() { try { return localStorage.getItem('mono_anime_theme') || 'light'; } catch { return 'light'; } },
            setTheme(t) { localStorage.setItem('mono_anime_theme', t); },
            getColorTheme() { try { return localStorage.getItem('mono_anime_color_theme') || 'default'; } catch { return 'default'; } },
            setColorTheme(t) { localStorage.setItem('mono_anime_color_theme', t); },
            getSettings() { try { return JSON.parse(localStorage.getItem('mono_anime_settings') || '{}'); } catch { return {}; } },
            saveSettings(s) { localStorage.setItem('mono_anime_settings', JSON.stringify(s)); }
        };

        function applyTheme(theme) {
            const btn = document.getElementById('themeToggleBtn');
            if (theme === 'dark') {
                document.body.classList.add('dark-mode');
                if (btn) btn.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                document.body.classList.remove('dark-mode');
                if (btn) btn.innerHTML = '<i class="fas fa-moon"></i>';
            }
        }

        function applyColorTheme(colorTheme) {
            document.body.setAttribute('data-theme', colorTheme);
            const ts = document.getElementById('themeSelectLeft');
            if (ts) ts.value = colorTheme;
            Storage.setColorTheme(colorTheme);
        }

        function toggleTheme() {
            const next = Storage.getTheme() === 'dark' ? 'light' : 'dark';
            Storage.setTheme(next);
            applyTheme(next);
            showToast(next === 'dark' ? '🌙 Темний режим' : '☀️ Світлий режим');
        }

        // ==================== TOAST ====================
        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2200);
        }

        // ==================== API ====================
        async function fetchUA(url) {
            const proxyUrl = getProxyUrl(url);
            const resp = await fetch(proxyUrl);
            if (!resp.ok) throw new Error(`Помилка ${resp.status}`);
            const html = await resp.text();
            return new DOMParser().parseFromString(html, 'text/html');
        }

        function parseCards(doc) {
            const cards = safeQueryAll('.poster', doc);
            if (cards.length) return cards.map(card => {
                const linkEl = card.tagName === 'A' ? card : safeQuery('a', card);
                const href = linkEl?.getAttribute('href') || '';
                const img = safeQuery('img', card);
                const posterSrc = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
                const titleEl = safeQuery('.poster__title', card) || safeQuery('h3', card);
                const title = (titleEl?.textContent || '').trim() || 'Без назви';
                return {
                    mal_id: href.hashCode(),
                    title,
                    url: href.startsWith('http') ? href : ANIMEUA_BASE + href,
                    images: { jpg: { large_image_url: posterSrc.startsWith('http') ? posterSrc : (posterSrc ? ANIMEUA_BASE +
                            posterSrc : '') } },
                    score: null,
                    year: null,
                    from: 'animeua'
                };
            });
            const links = safeQueryAll('a[href*="/anime/"]', doc);
            const unique = new Map();
            links.forEach(a => { if (!unique.has(a.href)) unique.set(a.href, a); });
            return Array.from(unique.values()).map(a => {
                const img = safeQuery('img', a);
                const src = img?.getAttribute('data-src') || img?.getAttribute('src') || '';
                const title = (safeQuery('.poster__title', a)?.textContent || a.textContent || '').trim();
                return {
                    mal_id: a.href.hashCode(),
                    title: title || 'Без назви',
                    url: a.href,
                    images: { jpg: { large_image_url: src.startsWith('http') ? src : ANIMEUA_BASE + src } },
                    score: null,
                    year: null,
                    from: 'animeua'
                };
            });
        }

        async function fetchMainPage(page) { const doc = await fetchUA(`${ANIMEUA_BASE}/page/${page}/`); return parseCards(
                doc); }
        async function searchAnimeUA(query, page) { const doc = await fetchUA(
                `${ANIMEUA_BASE}/index.php?do=search&subaction=search&story=${encodeURIComponent(query)}&page=${page}`); return parseCards(
                doc); }
        async function fetchByGenre(genreSlug, page) {
            const url = page > 1 ? `${ANIMEUA_BASE}/${genreSlug}/page/${page}/` : `${ANIMEUA_BASE}/${genreSlug}/`;
            const doc = await fetchUA(url);
            return parseCards(doc);
        }
        async function fetchTop100() { const doc = await fetchUA(`${ANIMEUA_BASE}/top.html`); return parseCards(doc); }

        function fetchGenres() { return Object.entries(GENRE_MAP).map(([name, slug]) => ({ slug, name })).sort((a, b) => a.name
                .localeCompare(b.name, 'uk')); }

        function extractSourcesFromText(text, providerName) {
            let sources = [];
            const jsonMatch = text.match(/file\s*:\s*(\[[\s\S]+?\]|\'[\s\S]+?\'|\"[\s\S]+?\"|\{[\s\S]+?\})/i) || text.match(
                /playlist\s*:\s*(\[[\s\S]+?\])/i);
            if (jsonMatch) {
                try {
                    let raw = jsonMatch[1].trim();
                    if ((raw.startsWith("'") && raw.endsWith("'")) || (raw.startsWith('"') && raw.endsWith('"'))) raw = raw.slice(
                    1, -1);
                    if (raw.startsWith('{') && raw.endsWith('}')) raw = `[${raw}]`;
                    const clean = raw.replace(/,\s*\]/g, ']').replace(/,\s*\}/g, '}');
                    const arr = JSON.parse(clean);
                    const walk = (items, dub, season) => {
                        dub = dub || '';
                        season = season || '1';
                        items.forEach(item => {
                            if (item.folder || item.playlist) {
                                let nd = dub,
                                    ns = season;
                                const ft = item.title || '';
                                const sm = ft.match(/[Сс]езон\s*(\d+)/);
                                if (sm) { ns = sm[1]; if (ft.trim().toLowerCase() !== `сезон ${ns}`.toLowerCase()) nd = ft
                                        .replace(/[Сс]езон\s*\d+/g, '').replace(/\//g, '').trim() || dub; } else if (ft)
                                    nd = ft;
                                walk(item.folder || item.playlist, nd, ns);
                            } else if (item.file) {
                                const epT = item.title || 'Серія';
                                let fd = dub || providerName || 'UA',
                                    fs = season;
                                const esm = epT.match(/[Сс]езон\s*(\d+)/);
                                if (esm) fs = esm[1];
                                const epm = epT.match(/(\d+)\s*[Сс]ері[яіяа]|[Сс]ері[яіяа]\s*(\d+)|[Ее]п\.?\s*(\d+)/);
                                sources.push({ label: epT, file: item.file, provider: providerName, dub: fd.trim(),
                                    season: fs, episode: epm ? (epm[1] || epm[2] || epm[3]) : '1' });
                            }
                        });
                    };
                    if (Array.isArray(arr)) walk(arr);
                    else if (arr.file) sources.push({ label: arr.title || 'Озвучка', file: arr.file, provider: providerName,
                        dub: providerName || 'UA', season: '1', episode: '1' });
                } catch (e) { console.warn('JSON parse error', e); }
            }
            if (sources.length === 0) {
                const urlMatches = [...text.matchAll(/https?:\/\/[^\s\'"<>]+\.m3u8[^\s\'"<>]*/g)];
                urlMatches.forEach((m, idx) => {
                    if (!sources.some(s => s.file === m[0])) sources.push({ label: `Потік ${idx+1}`, file: m[0],
                        provider: providerName, dub: providerName || 'UA', season: '1', episode: String(idx + 1) });
                });
            }
            return sources;
        }

        function extractPlayerIframeUrls(doc) {
            const selectors = ['.video-responsive iframe', '.player-responsive iframe', '#player iframe',
                '.pmovie__player iframe', 'iframe[src]', 'iframe[data-src]'
            ];
            const urls = [];
            for (const sel of selectors) {
                safeQueryAll(sel, doc).forEach(el => {
                    let src = el.getAttribute('src') || el.getAttribute('data-src');
                    if (!src || src === 'about:blank') return;
                    if (src.startsWith('//')) src = 'https:' + src;
                    if (!src.startsWith('http')) src = ANIMEUA_BASE + src;
                    urls.push(src);
                });
            }
            const scripts = safeQueryAll('script:not([src])', doc);
            for (const s of scripts) {
                const matches = s.textContent.matchAll(/(?:playerUrl|iframeUrl|src)\s*[:=]\s*['"]([^'"]+)['"]/g);
                for (const match of matches) {
                    let url = match[1];
                    if (url.includes('ashdi.vip') || url.includes('vidmoly') || url.includes('player')) {
                        if (url.startsWith('//')) url = 'https:' + url;
                        if (!url.startsWith('http')) url = ANIMEUA_BASE + url;
                        urls.push(url);
                    }
                }
            }
            return [...new Set(urls)];
        }

        async function loadAnimeDetails(animeUrl) {
            const doc = await fetchUA(animeUrl);
            let title = '';
            for (const sel of ['.page__subcol-main h1', '.pmovie__title', 'h1.title', 'h1']) {
                const el = safeQuery(sel, doc);
                if (el?.textContent.trim()) { title = el.textContent.trim(); break; }
            }
            let poster = '';
            for (const sel of ['div.page__subcol-side .img-fit-cover img', '.pmovie__poster img', '.anime__poster img']) {
                const el = safeQuery(sel, doc);
                if (el) {
                    const src = el.getAttribute('data-src') || el.getAttribute('src') || '';
                    if (src) { poster = src.startsWith('http') ? src : ANIMEUA_BASE + src; break; }
                }
            }
            const genres = safeQueryAll('.pmovie__genres a, .genres a', doc).map(a => a.textContent.trim()).filter(Boolean);
            const yearEl = safeQuery('.pmovie__year, .release-year', doc);
            const yearMatch = (yearEl?.textContent || '').match(/\d{4}/);
            const year = yearMatch ? parseInt(yearMatch[0]) : null;
            let synopsis = '';
            for (const sel of ['.full-text', '.pmovie__description', '.anime__description']) {
                const el = safeQuery(sel, doc);
                if (el?.textContent.trim()) { synopsis = el.textContent.trim(); break; }
            }
            let rating = '';
            const ratingEl = doc.querySelector('.pmovie__age p, .pmovie__age');
            if (ratingEl) rating = ratingEl.textContent.replace('Рейтинг:', '').trim();

            const playerUrls = extractPlayerIframeUrls(doc);
            const allRawSources = [];
            for (const playerUrl of playerUrls) {
                try {
                    let provider = 'Джерело';
                    if (playerUrl.includes('ashdi')) provider = 'Ashdi';
                    else if (playerUrl.includes('vidmoly')) provider = 'Vidmoly';
                    else if (playerUrl.includes('player')) provider = 'Player';
                    const playerHtml = await fetchUA(playerUrl);
                    const text = playerHtml.body?.innerHTML || '';
                    allRawSources.push(...extractSourcesFromText(text, provider));
                    const nestedIframes = safeQueryAll('iframe', playerHtml);
                    for (const nested of nestedIframes) {
                        let nestedUrl = nested.getAttribute('src') || nested.getAttribute('data-src');
                        if (nestedUrl && nestedUrl !== 'about:blank') {
                            if (nestedUrl.startsWith('//')) nestedUrl = 'https:' + nestedUrl;
                            if (!nestedUrl.startsWith('http')) nestedUrl = ANIMEUA_BASE + nestedUrl;
                            const nestedHtml = await fetchUA(nestedUrl);
                            allRawSources.push(...extractSourcesFromText(nestedHtml.body?.innerHTML || '', provider));
                        }
                    }
                } catch (e) { console.warn('Player fetch failed', playerUrl, e); }
            }

            const seasons = {};
            const seenKeys = new Set();
            allRawSources.forEach(s => {
                const sn = s.season || '1',
                    dn = s.dub || 'UA',
                    en = s.episode || '1';
                const uk = `${sn}-${dn}-${en}-${s.file}`;
                if (!seenKeys.has(uk)) {
                    seenKeys.add(uk);
                    if (!seasons[sn]) seasons[sn] = {};
                    if (!seasons[sn][dn]) seasons[sn][dn] = [];
                    seasons[sn][dn].push({ title: s.label, season: sn, episode: en, file: s.file, dub: dn, provider: s
                            .provider });
                }
            });
            for (const s in seasons)
                for (const d in seasons[s]) seasons[s][d].sort((a, b) => parseInt(a.episode) - parseInt(b.episode));
            return { mal_id: animeUrl.hashCode(), title, images: { jpg: { large_image_url: poster, image_url: poster } },
                genres, year, synopsis, seasons, url: animeUrl, from: 'animeua', rating };
        }

        async function loadContent() {
            const container = document.getElementById('animeContainer');

                if (currentTab === 'top100') currentList = await fetchTop100();
                else if (currentSearchQuery) currentList = await searchAnimeUA(currentSearchQuery, currentPage);
                else if (currentGenreSlug) currentList = await fetchByGenre(currentGenreSlug, currentPage);
                else currentList = await fetchMainPage(currentPage);

        async function openDetailModal(url) {
            const modal = document.getElementById('animeModal'),
                modalTitle = document.getElementById('modalTitle'),
                modalBody = document.getElementById('modalBody');
            if (!modal) return;
            if (lampaPlayerInstance) { lampaPlayerInstance.destroy();

            modalTitle.textContent = 'Завантаження...';

            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            try {
                const anime = await loadAnimeDetails(url);
                currentDetailAnime = anime;
                modalTitle.textContent = anime.title;
                const seasons = Object.keys(anime.seasons).sort((a, b) => parseInt(a) - parseInt(b));
                const firstSeason = seasons[0] || '1';
                const dubs = Object.keys(anime.seasons[firstSeason] || {}).sort();
                const firstDub = dubs[0] || '';
                const episodes = firstDub ? anime.seasons[firstSeason][firstDub] || [] : [];
                const startFile = episodes[0]?.file || '';
                const totalEpisodes = Object.values(anime.seasons).reduce((sum, s) => sum + Object.values(s).reduce((s2, e) =>
                    Math.max(s2, e.length), 0), 0);
                modalBody.innerHTML = `
              <div class="anime-detail-grid">
                <div class="detail-poster"><img src="${anime.images.jpg.large_image_url}" alt="${anime.title}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22170%22 height=%22240%22><rect fill=%22%23ddd%22 width=%22170%22 height=%22240%22/><text x=%2285%22 y=%22120%22 text-anchor=%22middle%22 fill=%22%23999%22>Немає</text></svg>'"></div>
                <div class="detail-info">
                  <div><span class="tag"><i class="fas fa-calendar"></i> ${anime.year||'—'}</span><span class="tag"><i class="fas fa-film"></i> ${totalEpisodes} еп.</span></div>
                  <div style="margin:0.5rem 0">${anime.genres.map(g=>`<span class="tag">${g}</span>`).join('')} ${anime.rating?`<span class="tag" style="background:var(--accent);color:var(--accent-text);"><i class="fas fa-user-shield"></i> ${anime.rating}</span>`:''}</div>
                  <div class="synopsis-container"><div class="synopsis" id="synopsisText">${anime.synopsis||'Опис відсутній.'}</div><button class="more-btn" id="moreBtn">більше</button></div>
                </div>
              </div>
              <div style="margin-top:1.5rem;position:relative;">
                <div id="lampaDetailPlayer" style="width:100%;background:#000;border-radius:12px;overflow:hidden;aspect-ratio:16/9;"></div>
                <div class="player-overlay-selectors">
                  <div class="glass-select-wrap"><select class="glass-select" id="seasonSelect">${seasons.map(s=>`<option value="${s}" ${s===firstSeason?'selected':''}>Сезон ${s}</option>`).join('')}</select><span class="glass-select-arrow">▼</span></div>
                  <div class="glass-select-wrap"><select class="glass-select" id="dubSelect">${dubs.map(d=>`<option value="${d}" ${d===firstDub?'selected':''}>${d}</option>`).join('')}</select><span class="glass-select-arrow">▼</span></div>
                  <div class="glass-select-wrap"><select class="glass-select" id="episodeSelect">${episodes.map((ep,i)=>`<option value="${ep.file}" ${i===0?'selected':''}>Еп. ${ep.episode}</option>`).join('')}</select><span class="glass-select-arrow">▼</span></div>
                </div>
              </div>`;
                const playerContainer = document.getElementById('lampaDetailPlayer');
                if (playerContainer) {
                    lampaPlayerInstance = new LampaPlayer(playerContainer, {});
                    const seasonSel = document.getElementById('seasonSelect'),
                        dubSel = document.getElementById('dubSelect'),
                        epSel = document.getElementById('episodeSelect');

                    function updateDubs() {
                        const s = seasonSel.value;
                        const avail = Object.keys(anime.seasons[s] || {}).sort();
                        dubSel.innerHTML = avail.map(d => `<option value="${d}">${d}</option>`).join('');
                        updateEpisodes();
                    }

                    function updateEpisodes() {
                        const s = seasonSel.value,
                            d = dubSel.value;
                        const eps = anime.seasons[s]?.[d] || [];
                        epSel.innerHTML = eps.map(ep => `<option value="${ep.file}">Еп. ${ep.episode}</option>`).join(
                        '');
                    }

                    function playEpisode(file) {
                        if (!file) { showToast('❌ Немає файлу для відтворення'); return; }
                        lampaPlayerInstance.loadSource(file, '', '');
                    }
                    seasonSel.addEventListener('change', () => { updateDubs();
                        playEpisode(epSel.value); });
                    dubSel.addEventListener('change', () => { updateEpisodes();
                        playEpisode(epSel.value); });
                    epSel.addEventListener('change', () => playEpisode(epSel.value));
                    if (startFile) lampaPlayerInstance.loadSource(startFile, '', '');
                }
                const synText = document.getElementById('synopsisText'),
                    moreBtn = document.getElementById('moreBtn');
                if (synText && moreBtn) {
                    const checkOverflow = () => {
                        if (synText.scrollHeight > synText.clientHeight + 2) { moreBtn.style.display = 'block'; } else { moreBtn
                                .style.display = 'none'; }
                    };
                    setTimeout(checkOverflow, 100);
                    moreBtn.addEventListener('click', () => {
                        const exp = synText.classList.toggle('expanded');
                        moreBtn.textContent = exp ? 'менше' : 'більше';
                    });
                }
            } catch (err) { modalBody.innerHTML =
                    `<div class="loader"><i class="fas fa-exclamation-circle"></i> Помилка: ${err.message}<br><button class="btn-outline" style="margin-top:1rem;" onclick="openDetailModal('${url}')">🔄 Спробувати знову</button></div>`; }
        }

        // ==================== LAMPA PLAYER ====================
        class LampaPlayer {
            constructor(container, options) {
                this.container = container;
                this.options = options || {};
                this.hls = null;
                this.state = { playing: false, currentTime: 0, duration: 0, volume: 0.8, muted: false, fullscreen: false,
                    loading: true, src: null };
                this.videoRef = null;
                this.containerRef = null;
                this._init();
            }
            _init() {
                this.container.innerHTML = '';
                this.containerRef = document.createElement('div');
                this.containerRef.className = 'lampa-player-container';
                this.containerRef.style.cssText =
                    'width:100%;aspect-ratio:16/9;background:#000;position:relative;border-radius:12px;overflow:hidden;';
                this.videoRef = document.createElement('video');
                this.videoRef.setAttribute('crossorigin', 'anonymous');
                this.videoRef.setAttribute('playsinline', '');
                this.videoRef.controls = false;
                this.videoRef.style.cssText = 'width:100%;height:100%;object-fit:contain;';
                this.containerRef.appendChild(this.videoRef);
                this.container.appendChild(this.containerRef);
                this._bindEvents();
            }
            _bindEvents() {
                const v = this.videoRef;
                v.addEventListener('play', () => { this.state.playing = true; });
                v.addEventListener('pause', () => { this.state.playing = false; });
                v.addEventListener('timeupdate', () => { this.state.currentTime = v.currentTime;
                    this.state.duration = v.duration || 0; });
                v.addEventListener('waiting', () => { this.state.loading = true; });
                v.addEventListener('canplay', () => { this.state.loading = false; });
                v.addEventListener('error', () => { this.state.loading = false; });
                this.containerRef.addEventListener('click', e => {
                    if (e.target.closest('.player-overlay-selectors')) return;
                    this.togglePlay();
                });
                this.containerRef.addEventListener('dblclick', e => {
                    if (e.target.closest('.player-overlay-selectors')) return;
                    this.toggleFullscreen();
                });
                document.addEventListener('fullscreenchange', () => { this.state.fullscreen = !!document.fullscreenElement; });
            }
            loadSource(src, animeTitle, episodeTitle) {
                this.state.src = src;
                const v = this.videoRef;
                this.state.loading = true;
                this.state.playing = false;
                if (this.hls) { this.hls.destroy();
                    this.hls = null; }
                v.pause();
                if (!src) { this.state.loading = false; return; }
                const proxyUrl = typeof getProxyUrl === 'function' ? getProxyUrl(src) : src;
                if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                    const hls = new Hls({ enableWorker: true, lowLatencyMode: false, backBufferLength: 90 });
                    this.hls = hls;
                    hls.loadSource(proxyUrl);
                    hls.attachMedia(v);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => { this.state.loading = false; });
                    hls.on(Hls.Events.ERROR, (ev, data) => { if (data && data.fatal) { this.state.loading = false;
                            v.src = proxyUrl; } });
                } else {
                    v.src = proxyUrl;
                    const onCanPlay = () => { this.state.loading = false;
                        v.removeEventListener('canplay', onCanPlay); };
                    v.addEventListener('canplay', onCanPlay);
                }
            }
            togglePlay() { const v = this.videoRef; if (v.paused) v.play().catch(() => {}); else v.pause(); }
            toggleFullscreen() { if (!document.fullscreenElement) this.containerRef.requestFullscreen().catch(() => {}); else document
                    .exitFullscreen(); }
            destroy() { if (this.hls) { this.hls.destroy();
                    this.hls = null; } this.videoRef.pause();
                this.videoRef.removeAttribute('src');
                this.videoRef.load(); if (this.container) this.container.innerHTML = ''; }
        }

        // ==================== КАРУСЕЛЬ ====================
        class Carousel {
            constructor(element, options) {
                this._element = element;
                this._interval = options.interval || 5000;
                this._wrap = options.wrap !== false;
                this._pause = options.pause || 'hover';
                this._touch = options.touch !== false;
                this._keyboard = options.keyboard !== false;
                this._isSliding = false;
                this._activeIndex = 0;
                this._items = [];
                this._indicators = [];
                this._timer = null;
                this._touchStartX = 0;
                this._init();
            }
            _init() {
                const inner = this._element.querySelector('.carousel-items');
                if (!inner) return;
                this._items = Array.from(inner.querySelectorAll('.carousel-item'));
                if (this._items.length === 0) return;
                this._activeIndex = Math.max(0, this._items.findIndex(item => item.classList.contains('active')));
                this._createIndicators();
                this._addControlListeners();
                this._slideTo(this._activeIndex);
                this.cycle();
                if (this._pause === 'hover') {
                    this._element.addEventListener('mouseenter', () => this.pause());
                    this._element.addEventListener('mouseleave', () => this.cycle());
                }
                if (this._touch) {
                    this._element.addEventListener('touchstart', this._touchStartHandler, { passive: true });
                    this._element.addEventListener('touchend', this._touchEndHandler, { passive: true });
                }
                document.addEventListener('visibilitychange', this._visibilityHandler);
            }
            _createIndicators() {
                const ic = this._element.querySelector('.carousel-indicators');
                if (!ic) return;
                ic.innerHTML = '';
                this._indicators = [];
                for (let i = 0; i < this._items.length; i++) {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.setAttribute('data-carousel-slide-to', i);
                    btn.setAttribute('aria-label', `Слайд ${i+1}`);
                    if (i === this._activeIndex) btn.classList.add('active');
                    btn.addEventListener('click', () => { this._slideTo(i);
                        this.cycle(); });
                    ic.appendChild(btn);
                    this._indicators.push(btn);
                }
            }
            _addControlListeners() {
                const pb = this._element.querySelector('[data-carousel-slide="prev"]'),
                    nb = this._element.querySelector('[data-carousel-slide="next"]');
                if (pb) pb.addEventListener('click', () => { this.prev();
                    this.cycle(); });
                if (nb) nb.addEventListener('click', () => { this.next();
                    this.cycle(); });
            }
            _slideTo(nextIndex) {
                const items = this._items,
                    activeIndex = this._activeIndex;
                if (nextIndex === activeIndex || this._isSliding || items.length === 0) return;
                this._isSliding = true;
                this._activeIndex = nextIndex;
                items.forEach((item, idx) => { item.classList.remove('active'); if (idx === nextIndex) item.classList.add(
                        'active'); });
                this._indicators.forEach((ind, idx) => ind.classList.toggle('active', idx === nextIndex));
                const inner = this._element.querySelector('.carousel-items');
                if (inner) inner.style.transform = `translateX(-${nextIndex*100}%)`;
                const onEnd = () => { inner.removeEventListener('transitionend', onEnd);
                    this._isSliding = false; };
                inner.addEventListener('transitionend', onEnd);
            }
            next() {
                const ni = (this._activeIndex + 1) % this._items.length;
                if (!this._wrap && this._activeIndex === this._items.length - 1) return;
                this._slideTo(ni);
            }
            prev() {
                const pi = (this._activeIndex - 1 + this._items.length) % this._items.length;
                if (!this._wrap && this._activeIndex === 0) return;
                this._slideTo(pi);
            }
            cycle() { this.pause(); if (this._interval && this._items.length > 1) this._timer = setInterval(() => this
                    .next(), this._interval); }
            pause() { if (this._timer) { clearInterval(this._timer);
                    this._timer = null; } }
            _touchStartHandler = (e) => { if (e.touches.length === 1) this._touchStartX = e.touches[0].clientX; };
            _touchEndHandler = (e) => {
                if (!this._touchStartX) return;
                const ex = e.changedTouches[0].clientX;
                const dx = ex - this._touchStartX;
                if (Math.abs(dx) > 50) { if (dx > 0) { this.prev();
                        this.cycle(); } else { this.next();
                        this.cycle(); } }
                this._touchStartX = 0;
            };
            _visibilityHandler = () => { if (document.hidden) this.pause();
                else this.cycle(); };
            dispose() { this.pause();
                document.removeEventListener('visibilitychange', this._visibilityHandler); }
            goToSlide(index) { this._slideTo(index);
                this.cycle(); }
        }

        // ==================== ФІНАЛЬНИЙ СТАРТ ====================
        function init() {
            applyTheme(Storage.getTheme());
